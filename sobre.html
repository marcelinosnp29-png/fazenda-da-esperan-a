<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Nós | Fazenda da Esperança</title>
<meta name="description" content="Conheça a história, missão, visão e valores da Fazenda da Esperança. Transformando vidas através da educação online.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 6px rgba(0,0,0,0.07);
    --shadow-md: 0 10px 25px rgba(0,0,0,0.1);
    --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-lg: 20px;
    --transition: all 0.3s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--gray-900);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    font-weight: 500;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  nav { display: flex; align-items: center; gap: 8px; }

  nav a {
    text-decoration: none;
    color: var(--gray-600);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: 8px;
    transition: var(--transition);
  }

  nav a:hover, nav a.active {
    color: var(--primary);
    background: rgba(37,99,235,0.08);
  }

  .btn-nav {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white) !important;
    padding: 9px 20px !important;
    border-radius: 8px !important;
    font-weight: 600 !important;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
    transition: var(--transition) !important;
  }

  .btn-nav:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(37,99,235,0.4) !important;
    background: linear-gradient(135deg, var(--primary-dark), var(--secondary-dark)) !important;
    color: var(--white) !important;
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: 8px;
    transition: var(--transition);
    background: none;
    border: none;
  }

  .hamburger:hover { background: var(--gray-100); }

  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: var(--transition);
  }

  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 70px;
    left: 0;
    right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 16px 24px;
    box-shadow: var(--shadow-md);
    z-index: 999;
    flex-direction: column;
    gap: 4px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    text-decoration: none;
    color: var(--gray-700);
    font-size: 15px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: 8px;
    transition: var(--transition);
  }

  .mobile-menu a:hover, .mobile-menu a.active {
    color: var(--primary);
    background: rgba(37,99,235,0.08);
  }

  .mobile-menu .btn-mobile {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white) !important;
    text-align: center;
    margin-top: 8px;
    font-weight: 600 !important;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }

  /* ===== HERO SOBRE ===== */
  .hero-sobre {
    background: linear-gradient(135deg, var(--gray-900) 0%, #1a2744 50%, var(--primary-dark) 100%);
    padding: 100px 24px 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero-sobre::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at center, rgba(37,99,235,0.15) 0%, transparent 60%);
    animation: pulse-bg 6s ease-in-out infinite;
  }

  @keyframes pulse-bg {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }

  .hero-sobre .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(37,99,235,0.2);
    border: 1px solid rgba(37,99,235,0.4);
    color: #93c5fd;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 50px;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .hero-sobre h1 {
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }

  .hero-sobre h1 span {
    background: linear-gradient(135deg, #60a5fa, var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sobre p {
    font-size: 18px;
    color: #94a3b8;
    max-width: 600px;
    margin: 0 auto 40px;
    line-height: 1.7;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    margin-top: 48px;
    padding-top: 48px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .stat-item { text-align: center; }

  .stat-number {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, #60a5fa, var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-label {
    font-size: 13px;
    color: #94a3b8;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== SECTIONS GERAIS ===== */
  section { padding: 80px 24px; }

  .container { max-width: 1200px; margin: 0 auto; }

  .section-label {
    display: inline-block;
    background: rgba(37,99,235,0.1);
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: clamp(28px, 3.5vw, 42px);
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.2;
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }

  .section-title span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-desc {
    font-size: 17px;
    color: var(--gray-500);
    max-width: 600px;
    line-height: 1.7;
  }

  /* ===== HISTÓRIA ===== */
  .historia { background: var(--white); }

  .historia-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
    margin-top: 60px;
  }

  .historia-img {
    position: relative;
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }

  .historia-img img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    display: block;
  }

  .historia-img-badge {
    position: absolute;
    bottom: 24px;
    left: 24px;
    background: var(--white);
    border-radius: var(--radius);
    padding: 16px 20px;
    box-shadow: var(--shadow-md);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .historia-img-badge .badge-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .historia-img-badge .badge-text strong {
    display: block;
    font-size: 18px;
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1;
  }

  .historia-img-badge .badge-text span {
    font-size: 12px;
    color: var(--gray-500);
    font-weight: 500;
  }

  .historia-content { }

  .historia-content .section-label { margin-bottom: 12px; }

  .historia-content p {
    font-size: 16px;
    color: var(--gray-600);
    line-height: 1.8;
    margin-bottom: 20px;
  }

  .historia-highlights {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: 32px;
  }

  .highlight-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px;
    background: var(--gray-50);
    border-radius: var(--radius);
    border-left: 3px solid var(--primary);
  }

  .highlight-icon {
    font-size: 22px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .highlight-text strong {
    display: block;
    font-size: 14px;
    font-weight: 700;
    color: var(--gray-800);
    margin-bottom: 4px;
  }

  .highlight-text span {
    font-size: 13px;
    color: var(--gray-500);
  }

  /* ===== MISSÃO VISÃO VALORES ===== */
  .mvv { background: var(--gray-50); }

  .mvv-header { text-align: center; margin-bottom: 60px; }
  .mvv-header .section-desc { margin: 0 auto; }

  .mvv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .mvv-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 40px 32px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .mvv-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    transform: scaleX(0);
    transition: var(--transition);
  }

  .mvv-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
  .mvv-card:hover::before { transform: scaleX(1); }

  .mvv-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(14,165,233,0.1));
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
  }

  .mvv-card h3 {
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-900);
    margin-bottom: 16px;
    letter-spacing: -0.3px;
  }

  .mvv-card p {
    font-size: 15px;
    color: var(--gray-500);
    line-height: 1.7;
  }

  .valores-list {
    list-style: none;
    text-align: left;
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .valores-list li {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: var(--gray-600);
    font-weight: 500;
  }

  .valores-list li::before {
    content: '✓';
    width: 22px;
    height: 22px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ===== LINHA DO TEMPO ===== */
  .timeline-section { background: var(--white); }

  .timeline-header { text-align: center; margin-bottom: 64px; }
  .timeline-header .section-desc { margin: 0 auto; }

  .timeline {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--primary), var(--secondary));
    transform: translateX(-50%);
  }

  .timeline-item {
    display: flex;
    align-items: center;
    margin-bottom: 48px;
    position: relative;
  }

  .timeline-item:nth-child(odd) { flex-direction: row; }
  .timeline-item:nth-child(even) { flex-direction: row-reverse; }

  .timeline-content {
    width: calc(50% - 40px);
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 28px;
    box-shadow: var(--shadow);
    transition: var(--transition);
  }

  .timeline-content:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

  .timeline-item:nth-child(odd) .timeline-content { margin-right: auto; }
  .timeline-item:nth-child(even) .timeline-content { margin-left: auto; }

  .timeline-dot {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    border: 4px solid var(--white);
    box-shadow: var(--shadow-md);
    z-index: 1;
    flex-shrink: 0;
  }

  .timeline-year {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 50px;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }

  .timeline-content h4 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .timeline-content p {
    font-size: 14px;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ===== EQUIPE ===== */
  .equipe { background: var(--gray-50); }

  .equipe-header { text-align: center; margin-bottom: 60px; }
  .equipe-header .section-desc { margin: 0 auto; }

  .equipe-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
  }

  .membro-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    text-align: center;
  }

  .membro-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }

  .membro-img {
    position: relative;
    overflow: hidden;
  }

  .membro-img img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
    transition: transform 0.4s ease;
  }

  .membro-card:hover .membro-img img { transform: scale(1.05); }

  .membro-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(37,99,235,0.8) 0%, transparent 60%);
    opacity: 0;
    transition: var(--transition);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 20px;
  }

  .membro-card:hover .membro-overlay { opacity: 1; }

  .membro-social {
    display: flex;
    gap: 10px;
  }

  .membro-social a {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-decoration: none;
    font-size: 14px;
    transition: var(--transition);
    backdrop-filter: blur(4px);
  }

  .membro-social a:hover { background: rgba(255,255,255,0.35); }

  .membro-info { padding: 20px; }

  .membro-info h4 {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 4px;
  }

  .membro-cargo {
    font-size: 13px;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .membro-desc {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ===== DIFERENCIAIS ===== */
  .diferenciais { background: var(--white); }

  .diferenciais-header { text-align: center; margin-bottom: 60px; }
  .diferenciais-header .section-desc { margin: 0 auto; }

  .diferenciais-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .diferencial-card {
    padding: 32px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--gray-200);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .diferencial-card::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    transform: scaleX(0);
    transition: var(--transition);
  }

  .diferencial-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
  .diferencial-card:hover::after { transform: scaleX(1); }

  .dif-icon {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
  }

  .diferencial-card h4 {
    font-size: 18px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 10px;
  }

  .diferencial-card p {
    font-size: 14px;
    color: var(--gray-500);
    line-height: 1.7;
  }

  /* ===== CTA ===== */
  .cta-sobre {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 80px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-sobre::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .cta-sobre::after {
    content: '';
    position: absolute;
    bottom: -100px;
    left: -100px;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
  }

  .cta-sobre .container { position: relative; z-index: 1; max-width: 700px; }

  .cta-sobre h2 {
    font-size: clamp(28px, 3.5vw, 42px);
    font-weight: 900;
    color: var(--white);
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }

  .cta-sobre p {
    font-size: 17px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 40px;
    line-height: 1.7;
  }

  .cta-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    color: var(--primary);
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 10px;
    text-decoration: none;
    transition: var(--transition);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
