<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Nós | Fazenda da Esperança</title>
<meta name="description" content="Conheça a história, missão, visão e valores da Fazenda da Esperança. Formação para voluntários e acolhidos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --success: #10b981;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
    --shadow: 0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,.1), 0 10px 10px -5px rgba(0,0,0,.04);
    --shadow-xl: 0 25px 50px -12px rgba(0,0,0,.25);
    --radius: 8px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --transition: all .3s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  img { max-width: 100%; display: block; }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  .container {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
    transition: var(--transition);
  }

  .header.scrolled {
    box-shadow: var(--shadow-md);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 72px;
    gap: 32px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 1.25rem;
    color: var(--primary);
    flex-shrink: 0;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .logo-text span {
    display: block;
    font-size: .7rem;
    font-weight: 400;
    color: var(--gray-500);
    letter-spacing: .05em;
    text-transform: uppercase;
  }

  .nav { display: flex; align-items: center; gap: 4px; }

  .nav a {
    padding: 8px 14px;
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 500;
    color: var(--gray-600);
    transition: var(--transition);
    white-space: nowrap;
  }

  .nav a:hover, .nav a.active {
    color: var(--primary);
    background: rgba(37,99,235,.08);
  }

  .header-cta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    font-family: inherit;
    white-space: nowrap;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(37,99,235,.45);
  }

  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
  }

  .btn-outline:hover {
    background: var(--primary);
    color: var(--white);
    transform: translateY(-2px);
  }

  .btn-lg {
    padding: 14px 32px;
    font-size: 1rem;
    border-radius: var(--radius-lg);
  }

  .btn-white {
    background: var(--white);
    color: var(--primary);
    box-shadow: var(--shadow-md);
  }

  .btn-white:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius);
    transition: var(--transition);
    background: none;
    border: none;
  }

  .hamburger:hover { background: var(--gray-100); }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: var(--transition);
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px;
    left: 0;
    right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-lg);
    padding: 20px 24px;
    z-index: 999;
    flex-direction: column;
    gap: 4px;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: .95rem;
    font-weight: 500;
    color: var(--gray-700);
    transition: var(--transition);
  }

  .mobile-menu a:hover, .mobile-menu a.active {
    color: var(--primary);
    background: rgba(37,99,235,.08);
  }

  .mobile-menu .btn { margin-top: 8px; justify-content: center; }

  /* ===== HERO SOBRE ===== */
  .hero-sobre {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 40%, #1e3a8a 100%);
    padding: 100px 0 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-sobre::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -20%;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(14,165,233,.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-sobre::after {
    content: '';
    position: absolute;
    bottom: -30%;
    left: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,255,255,.05) 0%, transparent 70%);
    border-radius: 50%;
  }

  .hero-sobre .container {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .breadcrumb {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
    font-size: .85rem;
    color: rgba(255,255,255,.7);
  }

  .breadcrumb a { color: rgba(255,255,255,.7); transition: var(--transition); }
  .breadcrumb a:hover { color: var(--white); }
  .breadcrumb span { color: var(--white); font-weight: 500; }

  .hero-sobre h1 {
    font-size: clamp(2.2rem, 5vw, 3.5rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.15;
    margin-bottom: 20px;
  }

  .hero-sobre h1 em {
    font-style: normal;
    background: linear-gradient(135deg, #93c5fd, var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sobre p {
    font-size: 1.15rem;
    color: rgba(255,255,255,.85);
    max-width: 640px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }

  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 48px;
    flex-wrap: wrap;
    margin-top: 48px;
    padding-top: 48px;
    border-top: 1px solid rgba(255,255,255,.15);
  }

  .hero-stat {
    text-align: center;
    color: var(--white);
  }

  .hero-stat .number {
    font-size: 2.5rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, #93c5fd, var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-stat .label {
    font-size: .85rem;
    color: rgba(255,255,255,.7);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  /* ===== SECTION STYLES ===== */
  .section { padding: 96px 0; }
  .section-alt { background: var(--gray-50); }

  .section-header {
    text-align: center;
    margin-bottom: 64px;
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(37,99,235,.1);
    color: var(--primary);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .section-header h2 {
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .section-header h2 span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .section-header p {
    font-size: 1.05rem;
    color: var(--gray-500);
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.7;
  }

  /* ===== HISTÓRIA ===== */
  .historia-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 64px;
    align-items: center;
  }

  .historia-content h2 {
    font-size: clamp(1.8rem, 3vw, 2.4rem);
    font-weight: 800;
    color: var(--gray-900);
    line-height: 1.2;
    margin-bottom: 20px;
  }

  .historia-content h2 span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .historia-content p {
    font-size: 1rem;
    color: var(--gray-600);
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .historia-content p:last-of-type { margin-bottom: 32px; }

  .historia-image {
    position: relative;
  }

  .historia-image img {
    width: 100%;
    height: 480px;
    object-fit: cover;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-xl);
  }

  .historia-image-badge {
    position: absolute;
    bottom: 24px;
    left: -24px;
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 16px 20px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .historia-image-badge .icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .historia-image-badge .text strong {
    display: block;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--gray-900);
  }

  .historia-image-badge .text span {
    font-size: .8rem;
    color: var(--gray-500);
  }

  /* ===== MISSÃO VISÃO VALORES ===== */
  .mvv-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }

  .mvv-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 40px 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .mvv-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    opacity: 0;
    transition: var(--transition);
  }

  .mvv-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-xl);
  }

  .mvv-card:hover::before { opacity: 1; }

  .mvv-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, rgba(37,99,235,.1), rgba(14,165,233,.1));
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    margin-bottom: 24px;
  }

  .mvv-card h3 {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 12px;
  }

  .mvv-card p {
    font-size: .95rem;
    color: var(--gray-600);
    line-height: 1.7;
  }

  /* ===== VALORES LIST ===== */
  .valores-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 24px;
  }

  .valor-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--gray-50);
    border-radius: var(--radius);
    font-size: .9rem;
    font-weight: 500;
    color: var(--gray-700);
    transition: var(--transition);
  }

  .valor-item:hover {
    background: rgba(37,99,235,.08);
    color: var(--primary);
  }

  .valor-item .dot {
    width: 8px;
    height: 8px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== TIMELINE ===== */
  .timeline {
    position: relative;
    max-width: 800px;
    margin: 0 auto;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--primary), var(--secondary));
    transform: translateX(-50%);
  }

  .timeline-item {
    display: flex;
    justify-content: flex-end;
    padding-right: calc(50% + 40px);
    margin-bottom: 48px;
    position: relative;
  }

  .timeline-item:nth-child(even) {
    justify-content: flex-start;
    padding-right: 0;
    padding-left: calc(50% + 40px);
  }

  .timeline-dot {
    position: absolute;
    left: 50%;
    top: 20px;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 50%;
    border: 3px solid var(--white);
    box-shadow: 0 0 0 3px rgba(37,99,235,.2);
    z-index: 1;
  }

  .timeline-content {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    max-width: 340px;
    transition: var(--transition);
  }

  .timeline-content:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .timeline-year {
    display: inline-block;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white);
    font-size: .75rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
    letter-spacing: .05em;
  }

  .timeline-content h3 {
    font-size: 1.05rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 8px;
  }

  .timeline-content p {
    font-size: .9rem;
    color: var(--gray-600);
    line-height: 1.6;
  }

  /* ===== EQUIPE ===== */
  .team-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
  }

  .team-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    transition: var(--transition);
    text-align: center;
  }

  .team-card:hover {
    transform: translateY(-8px);
    box-shadow: var(--shadow-xl);
  }

  .team-card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    transition: var(--transition);
  }

  .team-card:hover img { transform: scale(1.05); }

  .team-card-body {
    padding: 20px 16px 24px;
  }

  .team-card h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 4px;
  }

  .team-card .role {
    font-size: .82rem;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .team-card p {
    font-size: .85rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  .team-social {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
  }

  .team-social a {
    width: 32px;
    height: 32px;
    background: var(--gray-100);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .85rem;
    color: var(--gray-500);
    transition: var(--transition);
  }

  .team-social a:hover {
    background: var(--primary);
    color: var(--white);
  }

  /* ===== DIFERENCIAIS ===== */
  .diferenciais-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
  }

  .diferencial-card {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    padding: 28px;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    transition: var(--transition);
  }

  .diferencial-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: rgba(37,99,235,.2);
  }

  .diferencial-icon {
    width: 52px;
    height: 52px;
    background: linear-gradient(135deg, rgba(37,99,235,.1), rgba(14,165,233,.1));
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .diferencial-card h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 6px;
  }

  .diferencial-card p {
    font-size: .88rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ===== PARCEIROS ===== */
  .parceiros-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
  }

  .parceiro-item {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    font-weight: 600;
    color: var(--gray-400);
    transition: var(--transition);
    min-width: 160px;
    text-align: center;
  }

  .parceiro-item:hover {
    color: var(--primary);
    border-color: var(--primary);
    box-shadow: var(--shadow);
  }

  /* ===== DEPOIMENTOS ===== */
  .depoimentos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }

  .depoimento-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 32px;
    box-shadow: var(--shadow);
    border: 1px solid var(--gray-100);
    transition: var(--transition);
    position: relative;
  }

  .depoimento-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
  }

  .depoimento-quote {
    font-size: 3rem;
    color: var(--primary);
    line-height: 1;
    margin-bottom: 16px;
    opacity: .3;
  }

  .depoimento-card p {
    font-size: .95rem;
    color: var(--gray-600);
    line-height: 1.7;
    margin-bottom: 24px;
    font-style: italic;
  }

  .depoimento-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .depoimento-author img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
  }

  .depoimento-author strong {
    display: block;
    font-size: .9rem;
    font-weight: 700;
    color: var(--gray-900);
  }

  .depoimento-author span {
    font-size: .8rem;
    color: var(--gray-500);
  }

  .stars {
    color: #f59e0b;
    font-size: .9rem;
    margin-bottom: 4px;
  }

  /* ===== CTA ===== */

    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, #1e3a8a 100%);
    padding: 96px 0;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(14,165,233,.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .cta-section::after {
    content: '';
    position: absolute;
    bottom: -40%;
    left: -5%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255,255,255,.05) 0%, transparent 70%);
    border-radius: 50%;
  }

    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 700px;

    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 900;
    color: var(--white);
    line-height: 1.2;
    margin-bottom: 16px;
  }

  .cta-content p {
    font-size: 1.1rem;
    color: rgba(255,255,255,.8);
    line-height: 1.7;
    margin-bottom: 40px;
  }

  .cta-buttons {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
