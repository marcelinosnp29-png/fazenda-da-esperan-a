<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Política de Privacidade da Fazenda da Esperança - Plataforma de Formação para Voluntários e Acolhidos. Conformidade com a LGPD (Lei 13.709/2018).">
    <meta name="robots" content="index, follow">
    <title>Política de Privacidade | Fazenda da Esperança</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #0ea5e9;
            --secondary-dark: #0284c7;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            color: var(--gray-800);
            background-color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== HEADER ========== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, #1a3a8f 100%);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-lg);
        }

        .header-top {
            background: rgba(0,0,0,0.15);
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .header-top-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-top-text {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-top-text svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .header-top-links {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-top-links a {
            font-size: 12px;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-top-links a:hover {
            color: var(--white);
        }

        .header-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 24px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }

        .logo-icon svg {
            width: 30px;
            height: 30px;
            color: var(--white);
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .logo-text span {
            font-size: 12px;
            color: rgba(255,255,255,0.75);
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            white-space: nowrap;
        }

        nav a:hover {
            background: rgba(255,255,255,0.15);
            color: var(--white);
        }

        nav a.active {
            background: rgba(255,255,255,0.2);
            color: var(--white);
        }

        .btn-header {
            background: var(--white);
            color: var(--primary) !important;
            font-weight: 700 !important;
            padding: 10px 20px !important;
            border-radius: var(--radius) !important;
            box-shadow: var(--shadow-md);
            transition: var(--transition) !important;
        }

        .btn-header:hover {
            background: var(--gray-100) !important;
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg) !important;
        }

        .mobile-menu-btn {
            display: none;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: var(--white);
            padding: 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
        }

        .mobile-menu-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .mobile-menu-btn svg {
            width: 22px;
            height: 22px;
            display: block;
        }

        /* ========== PAGE HERO ========== */
        .page-hero {
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 50%, #1a2744 100%);
            padding: 64px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(37,99,235,0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        .page-hero::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 60%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(14,165,233,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .page-hero-inner {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .page-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(37,99,235,0.2);
            border: 1px solid rgba(37,99,235,0.4);
            color: #93c5fd;
            font-size: 13px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 100px;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        .page-hero-badge svg {
            width: 14px;
            height: 14px;
        }

        .page-hero h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .page-hero p {
            font-size: 16px;
            color: rgba(255,255,255,0.7);
            max-width: 600px;
            margin: 0 auto 28px;
            line-height: 1.7;
        }

        .page-hero-meta {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .hero-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.65);
        }

        .hero-meta-item svg {
            width: 16px;
            height: 16px;
            color: var(--secondary);
            flex-shrink: 0;
        }

        .hero-meta-divider {
            width: 1px;
            height: 16px;
            background: rgba(255,255,255,0.2);
        }

        /* ========== BREADCRUMB ========== */
        .breadcrumb-bar {
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 24px;
        }

        .breadcrumb-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            list-style: none;
            flex-wrap: wrap;
        }

        .breadcrumb li {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .breadcrumb li a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .breadcrumb li a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .breadcrumb li span {
            color: var(--gray-500);
        }

        .breadcrumb li.active span {
            color: var(--gray-700);
            font-weight: 500;
        }

        .breadcrumb-sep {
            color: var(--gray-400);
        }

        /* ========== MAIN CONTENT ========== */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            align-items: start;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: sticky;
            top: 100px;
        }

        .sidebar-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .sidebar-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
        }

        .sidebar-header h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
        }

        .sidebar-nav {
            padding: 12px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            color: var(--gray-700);
            font-size: 13px;
            font-weight: 500;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            background: var(--gray-50);
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .sidebar-nav a svg {
            width: 16px;
            height: 16px;
            color: var(--gray-400);
            flex-shrink: 0;
            transition: var(--transition);
        }

        .sidebar-nav a:hover svg {
            color: var(--primary);
        }

        .sidebar-nav a span.num {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            background: var(--gray-100);
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-500);
            flex-shrink: 0;
            margin-left: auto;
            transition: var(--transition);
        }

        .sidebar-nav a:hover span.num {
            background: var(--primary);
            color: var(--white);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--gray-100);
            margin: 8px 12px;
        }

        .sidebar-contact {
            padding: 16px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
        }

        .sidebar-contact p {
            font-size: 12px;
            color: var(--gray-500);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .sidebar-contact a {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            padding: 8px 12px;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-sm);
            transition: var(--transition);
            margin-bottom: 8px;
        }

        .sidebar-contact a:hover {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .sidebar-contact a svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .lgpd-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(16,185,129,0.08);
            border: 1px solid rgba(16,185,129,0.25);
            border-radius: var(--radius-sm);
            margin-top: 8px;
        }

        .lgpd-badge svg {
            width: 18px;
            height: 18px;
            color: var(--success);
            flex-shrink: 0;
        }

        .lgpd-badge span {
            font-size: 11px;
            font-weight: 600;
            color: #065f46;
            line-height: 1.4;
        }

        /* ========== POLICY CONTENT ========== */
        .policy-content {
            min-width: 0;
        }

        .policy-intro-card {
            background: linear-gradient(135deg, rgba(37,99,235,0.05) 0%, rgba(14,165,233,0.05) 100%);
            border: 1px solid rgba(37,99,235,0.15);
            border-radius: var(--radius-lg);
            padding: 28px;
            margin-bottom: 40px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .policy-intro-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: var(--shadow-md);
        }

        .policy-intro-icon svg {
            width: 26px;
            height: 26px;
            color: var(--white);
        }

        .policy-intro-text h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .policy-intro-text p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.7;
        }

        .policy-section {
            margin-bottom: 40px;
            scroll-margin-top: 110px;
        }

        .section-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-100);
        }

        .section-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            color: var(--white);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .section-title-area h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .section-title-area p {
            font-size: 13px;
            color: var(--gray-500);
        }

        .policy-text {
            font-size: 15px;
            color: var(--gray-700);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .policy-text:last-child {
            margin-bottom: 0;
        }

        .policy-text strong {
            color: var(--gray-900);
            font-weight: 600;
        }

        .policy-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(37,99,235,0.3);
            transition: var(--transition);
        }

        .policy-text a:hover {
            color: var(--primary-dark);
            border-bottom-color: var(--primary-dark);
        }

        /* Info Cards */
        .info-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .info-card.blue {
            background: rgba(37,99,235,0.03);
            border-color: rgba(37,99,235,0.15);
        }

        .info-card.green {
            background: rgba(16,185,129,0.03);
            border-color: rgba(16,185,129,0.15);
        }

        .info-card.yellow {
            background: rgba(245,158,11,0.03);
            border-color: rgba(245,158,11,0.2);
        }

        .info-card.red {
            background: rgba(239,68,68,0.03);
            border-color: rgba(239,68,68,0.15);
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .info-card-header svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .info-card.blue .info-card-header svg { color: var(--primary); }
        .info-card.green .info-card-header svg { color: var(--success); }
        .info-card.yellow .info-card-header svg { color: var(--warning); }
        .info-card.red .info-card-header svg { color: var(--danger); }

        .info-card-header h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-900);
        }

        .info-card p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.7;
        }

        /* Data Table */
        .data-table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table thead {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
        }

        .data-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--gray-100);
            transition: var(--transition);
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: var(--gray-50);
        }

        .data-table tbody td {
            padding: 14px 16px;
            color: var(--gray-700);
            vertical-align: top;
            line-height: 1.6;
        }

        .data-table tbody td:first-child {
            font-weight: 600;
            color: var(--gray-900);
        }

        .badge-table {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }

        .badge-table.blue {
            background: rgba(37,99,235,0.1);
            color: var(--primary-dark);
        }

        .badge-table.green {
            background: rgba(16,185,129,0.1);
            color: #065f46;
        }

        .badge-table.yellow {
            background: rgba(245,158,11,0.1);
            color: #92400e;
        }

        .badge-table.purple {
            background: rgba(139,92,246,0.1);
            color: #5b21b6;
        }

        /* Lists */
        .policy-list {
            list-style: none;
            margin: 16px 0;
        }

        .policy-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            font-size: 14px;
            color: var(--gray-700);
            line-height: 1.6;
            border-bottom: 1px solid var(--gray-100);
        }

        .policy-list li:last-child {
            border-bottom: none;
        }

        .policy-list li::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            flex-shrink: 0;
            margin-top: 7px;
        }

        .policy-list.green li::before {
            background: var(--success);
        }

        .policy-list.check li::before {
            display: none;
        }

        .policy-list.check li .check-icon {
            width: 20px;
            height: 20px;
            background: rgba(16,185,129,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .policy-list.check li .check-icon svg {
            width: 12px;
            height: 12px;
            color: var(--success);
        }

        /* Rights Grid */
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        .right-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .right-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .right-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: rgba(37,99,235,0.2);
        }

        .right-card-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(14,165,233,0.1));
            border-radius: var(--radius-sm);
