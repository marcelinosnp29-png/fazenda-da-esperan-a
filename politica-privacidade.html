<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Política de Privacidade da Fazenda da Esperança - Cursos Online. Saiba como coletamos, usamos e protegemos seus dados pessoais conforme a LGPD.">
    <meta name="robots" content="index, follow">
    <title>Política de Privacidade | Fazenda da Esperança</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #0ea5e9;
            --secondary-dark: #0284c7;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --radius: 12px;
            --radius-lg: 16px;
            --transition: all 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--gray-800);
            background-color: var(--white);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== HEADER ========== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--white);
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
            flex-shrink: 0;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .logo-tagline {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.85;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 8px;
            transition: var(--transition);
        }

        nav a:hover {
            background: rgba(255,255,255,0.15);
            color: var(--white);
        }

        .btn-header {
            background: rgba(255,255,255,0.2);
            color: var(--white) !important;
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(10px);
            padding: 8px 20px !important;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: var(--transition);
        }

        .btn-header:hover {
            background: var(--white) !important;
            color: var(--primary) !important;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
            background: none;
            border: none;
        }

        .hamburger:hover {
            background: rgba(255,255,255,0.15);
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: var(--transition);
        }

        .mobile-menu {
            display: none;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--secondary-dark) 100%);
            padding: 16px 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .mobile-menu.active {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: var(--transition);
        }

        .mobile-menu a:last-child {
            border-bottom: none;
        }

        .mobile-menu a:hover {
            color: var(--white);
            padding-left: 8px;
        }

        /* ========== HERO SECTION ========== */
        .page-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 64px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
            animation: pulse 8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .page-hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
        }

        .page-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            color: var(--white);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(10px);
        }

        .page-hero h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .page-hero p {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
            max-width: 560px;
            margin: 0 auto 24px;
        }

        .vigencia-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ========== BREADCRUMB ========== */
        .breadcrumb-bar {
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
            padding: 12px 24px;
        }

        .breadcrumb-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray-500);
        }

        .breadcrumb-inner a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .breadcrumb-inner a:hover {
            color: var(--primary-dark);
        }

        .breadcrumb-inner span {
            color: var(--gray-400);
        }

        /* ========== MAIN CONTENT ========== */
        .content-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 24px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 48px;
            align-items: start;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            position: sticky;
            top: 96px;
        }

        .toc-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .toc-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--gray-500);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--gray-100);
        }

        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .toc-list li a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 10px;
            border-radius: 8px;
            transition: var(--transition);
            line-height: 1.4;
        }

        .toc-list li a:hover {
            background: var(--gray-50);
            color: var(--primary);
        }

        .toc-list li a .toc-num {
            width: 22px;
            height: 22px;
            background: var(--gray-100);
            color: var(--gray-500);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .toc-list li a:hover .toc-num {
            background: var(--primary);
            color: var(--white);
        }

        .dpo-card {
            margin-top: 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: var(--radius-lg);
            padding: 20px;
            color: var(--white);
        }

        .dpo-card-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.85;
            margin-bottom: 12px;
        }

        .dpo-card p {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .dpo-card a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.2);
            color: var(--white);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            transition: var(--transition);
            word-break: break-all;
        }

        .dpo-card a:hover {
            background: rgba(255,255,255,0.3);
        }

        .lgpd-badge-sidebar {
            margin-top: 20px;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .lgpd-badge-sidebar .shield-icon {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .lgpd-badge-sidebar p {
            font-size: 12px;
            color: var(--gray-500);
            font-weight: 500;
        }

        .lgpd-badge-sidebar strong {
            display: block;
            font-size: 13px;
            color: var(--gray-700);
            margin-bottom: 4px;
        }

        /* ========== POLICY CONTENT ========== */
        .policy-content {
            min-width: 0;
        }

        .policy-section {
            margin-bottom: 48px;
            scroll-margin-top: 96px;
        }

        .section-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-100);
        }

        .section-number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 800;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }

        .section-title-group h2 {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1.3;
            margin-bottom: 4px;
        }

        .section-title-group .section-subtitle {
            font-size: 13px;
            color: var(--gray-500);
            font-weight: 400;
        }

        .policy-text {
            font-size: 15px;
            color: var(--gray-700);
            line-height: 1.8;
            margin-bottom: 16px;
        }

        .policy-text:last-child {
            margin-bottom: 0;
        }

        /* Info Box */
        .info-box {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-left: 4px solid var(--primary);
            border-radius: var(--radius);
            padding: 20px 24px;
            margin: 20px 0;
        }

        .info-box.warning {
            border-left-color: var(--warning);
            background: #fffbeb;
            border-color: #fde68a;
        }

        .info-box.success {
            border-left-color: var(--success);
            background: #f0fdf4;
            border-color: #bbf7d0;
        }

        .info-box.danger {
            border-left-color: var(--danger);
            background: #fef2f2;
            border-color: #fecaca;
        }

        .info-box-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-box p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.7;
        }

        /* Data Cards Grid */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .data-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }

        .data-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .data-card-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1) 0%, rgba(14,165,233,0.1) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 12px;
        }

        .data-card h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .data-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .data-card ul li {
            font-size: 13px;
            color: var(--gray-600);
            display: flex;
            align-items: flex-start;
            gap: 6px;
            line-height: 1.5;
        }

        .data-card ul li::before {
            content: '•';
            color: var(--primary);
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Rights Table */
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .right-item {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: var(--transition);
        }

        .right-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .right-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .right-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .right-info p {
            font-size: 12px;
            color: var(--gray-500);
            line-height: 1.5;
        }

        /* Cookie Table */
        .cookie-table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
            margin: 20px 0;
            box-shadow: var(--shadow-sm);
        }

        .cookie-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .cookie-table thead {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        .cookie-table thead th {
            color: var(--white);
            font-weight: 600;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .cookie-table tbody tr {
            border-bottom: 1px solid var(--gray-100);
            transition: var(--transition);
        }

        .cookie-table tbody tr:last-child {
            border-bottom: none;
        }

        .cookie-table tbody tr:hover {
            background: var(--gray-50);
        }

        .cookie-table tbody td {
            padding: 14px 16px;
            color: var(--gray-700);
            vertical-align: top;
            line-height: 1.5;
        }

        .cookie-type-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-essential {
            background: #dcfce7;
            color: #166534;
        }

        .badge-analytics {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-marketing {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-functional {
            background: #f3e8ff;
            color: #6b21a8;
        }

        /* Retention Timeline */
        .retention-timeline {
            margin: 20px 0;
            position: relative;
        }

        .retention-item {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .retention-dot {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: var(--shadow);
        }

        .retention-content {
            flex: 1;
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-sm);
        }

        .retention-content h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 4px;
        }

        .retention-content p {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        .retention-period {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, rgba(37,99,235,0.1) 0%, rgba(14,165,233,0.1) 100%);
            color: var(--primary);
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            margin-top: 8px;
            border: 1px solid rgba(37,99,235,0.2);
        }

        /* Legal Basis */
        .legal-basis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }

        .legal-basis-item {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 16px;
            transition: var(--transition);
        }

        .legal-basis-item:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        .legal-art {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            background: rgba(37,99,235,0.08);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .legal-basis-item h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 6px;
        }

        .legal-basis-item p {
            font-size: 12px;
            color: var(--gray-500);
            line-height: 1.6;
        }

        /* Contact Section */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin: 20px 0;
        }

        .contact-card {
            background: var(--white);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px;
            text-align: center;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }

        .contact-card:hover {
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
            transform: translateY(-3px);
        }

        .contact-card-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .contact-card h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 8px;
        }

        .contact-card a, .contact-card p {
            font-size: 13px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            word-break: break-all;
        }

        .contact-card p {
