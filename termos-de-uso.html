<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termos de Uso - Fazenda da Esperança</title>
    <meta name="description" content="Termos de Uso da plataforma de formação online da Fazenda da Esperança. Conheça seus direitos e responsabilidades.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #3b82f6;
            --secondary: #0ea5e9;
            --secondary-dark: #0284c7;
            --white: #ffffff;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --gray-900: #0f172a;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow: 0 1px 3px 0 rgba(0,0,0,0.1), 0 1px 2px -1px rgba(0,0,0,0.1);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
            --radius-sm: 6px;
            --radius: 10px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 50%, #1e3a8a 100%);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(37, 99, 235, 0.3);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
        }

        .logo-icon svg {
            width: 26px;
            height: 26px;
            fill: var(--white);
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.2;
            letter-spacing: -0.3px;
        }

        .logo-subtitle {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            color: var(--white);
            background: rgba(255,255,255,0.1);
        }

        .nav-link.active {
            color: var(--white);
            background: rgba(255,255,255,0.15);
        }

        .btn-whatsapp-header {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--success);
            color: var(--white);
            text-decoration: none;
            padding: 9px 18px;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.4);
        }

        .btn-whatsapp-header:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.5);
        }

        .btn-whatsapp-header svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.1);
            border: none;
            transition: background 0.2s;
        }

        .hamburger:hover {
            background: rgba(255,255,255,0.2);
        }

        .hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .mobile-menu {
            display: none;
            background: var(--primary-dark);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 16px 24px;
        }

        .mobile-menu.open {
            display: block;
        }

        .mobile-menu a {
            display: block;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: color 0.2s;
        }

        .mobile-menu a:hover {
            color: var(--white);
        }

        .mobile-menu a:last-child {
            border-bottom: none;
            color: var(--success);
        }

        /* ===== HERO SECTION ===== */
        .page-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 64px 24px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 60%),
                        radial-gradient(circle at 70% 50%, rgba(14, 165, 233, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .page-hero::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--gray-50);
            clip-path: ellipse(55% 100% at 50% 100%);
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: var(--white);
            padding: 6px 16px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .hero-badge svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .page-hero h1 {
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 800;
            color: var(--white);
            margin-bottom: 16px;
            letter-spacing: -1px;
            line-height: 1.15;
        }

        .page-hero p {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
            max-width: 560px;
            margin: 0 auto 28px;
            line-height: 1.7;
        }

        .hero-meta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
        }

        .hero-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 13px;
            font-weight: 500;
        }

        .hero-meta-item svg {
            width: 16px;
            height: 16px;
            fill: rgba(255,255,255,0.6);
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            align-items: start;
        }

        /* ===== SIDEBAR / TABLE OF CONTENTS ===== */
        .toc-sidebar {
            position: sticky;
            top: 96px;
        }

        .toc-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
        }

        .toc-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--gray-100);
        }

        .toc-header-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toc-header-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .toc-header h3 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
            letter-spacing: -0.2px;
        }

        .toc-list {
            list-style: none;
        }

        .toc-list li {
            margin-bottom: 2px;
        }

        .toc-list a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            line-height: 1.4;
        }

        .toc-list a:hover {
            color: var(--primary);
            background: rgba(37, 99, 235, 0.06);
        }

        .toc-list a::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gray-300);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .toc-list a:hover::before {
            background: var(--primary);
        }

        .toc-number {
            font-size: 11px;
            font-weight: 700;
            color: var(--gray-400);
            min-width: 18px;
        }

        .toc-divider {
            height: 1px;
            background: var(--gray-100);
            margin: 12px 0;
        }

        .toc-update-box {
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, rgba(37,99,235,0.06), rgba(14,165,233,0.06));
            border-radius: var(--radius);
            border: 1px solid rgba(37,99,235,0.15);
        }

        .toc-update-box p {
            font-size: 12px;
            color: var(--gray-600);
            line-height: 1.5;
        }

        .toc-update-box strong {
            color: var(--primary);
            font-weight: 700;
        }

        /* ===== CONTENT AREA ===== */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        /* ===== ALERT BANNER ===== */
        .alert-banner {
            background: linear-gradient(135deg, rgba(37,99,235,0.08), rgba(14,165,233,0.08));
            border: 1px solid rgba(37,99,235,0.2);
            border-left: 4px solid var(--primary);
            border-radius: var(--radius);
            padding: 20px 24px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .alert-banner-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .alert-banner-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--white);
        }

        .alert-banner-text h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 6px;
        }

        .alert-banner-text p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.6;
        }

        /* ===== SECTION CARDS ===== */
        .section-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 36px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--gray-200);
            scroll-margin-top: 100px;
            transition: box-shadow 0.2s ease;
        }

        .section-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .section-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--gray-100);
        }

        .section-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .section-icon svg {
            width: 24px;
            height: 24px;
            fill: var(--white);
        }

        .icon-blue { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .icon-green { background: linear-gradient(135deg, #10b981, #059669); }
        .icon-orange { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .icon-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .icon-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .icon-teal { background: linear-gradient(135deg, #14b8a6, #0d9488); }
        .icon-indigo { background: linear-gradient(135deg, #6366f1, #4f46e5); }
        .icon-pink { background: linear-gradient(135deg, #ec4899, #db2777); }
        .icon-cyan { background: linear-gradient(135deg, #06b6d4, #0891b2); }
        .icon-slate { background: linear-gradient(135deg, #64748b, #475569); }

        .section-title-group h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .section-number {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-400);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .section-body {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .section-body p {
            font-size: 15px;
            color: var(--gray-700);
            line-height: 1.75;
        }

        .section-body p strong {
            color: var(--gray-900);
            font-weight: 600;
        }

        /* ===== LISTS ===== */
        .styled-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .styled-list li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 15px;
            color: var(--gray-700);
            line-height: 1.6;
        }

        .list-bullet {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .list-bullet svg {
            width: 12px;
            height: 12px;
            fill: var(--white);
        }

        .bullet-blue { background: var(--primary); }
        .bullet-green { background: var(--success); }
        .bullet-orange { background: var(--warning); }
        .bullet-red { background: var(--danger); }
        .bullet-purple { background: #8b5cf6; }
        .bullet-teal { background: #14b8a6; }

        /* ===== INFO BOXES ===== */
        .info-box {
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }

        .info-box-blue {
            background: rgba(37,99,235,0.06);
            border: 1px solid rgba(37,99,235,0.15);
        }

        .info-box-green {
            background: rgba(16,185,129,0.06);
            border: 1px solid rgba(16,185,129,0.15);
        }

        .info-box-orange {
            background: rgba(245,158,11,0.06);
            border: 1px solid rgba(245,158,11,0.15);
        }

        .info-box-red {
            background: rgba(239,68,68,0.06);
            border: 1px solid rgba(239,68,68,0.15);
        }

        .info-box-purple {
            background: rgba(139,92,246,0.06);
            border: 1px solid rgba(139,92,246,0.15);
        }

        .info-box-icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-box-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .info-box-content h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .info-box-content p {
            font-size: 14px;
            line-height: 1.6;
            margin: 0 !important;
        }

        .info-box-blue .info-box-content h4 { color: var(--primary-dark); }
        .info-box-blue .info-box-content p { color: var(--gray-600); }
        .info-box-green .info-box-content h4 { color: #065f46; }
        .info-box-green .info-box-content p { color: #047857; }
        .info-box-orange .info-box-content h4 { color: #92400e; }
        .info-box-orange .info-box-content p { color: #b45309; }
        .info-box-red .info-box-content h4 { color: #991b1b; }
        .info-box-red .info-box-content p { color: #b91c1c; }
        .info-box-purple .info-box-content h4 { color: #4c1d95; }
        .info-box-purple .info-box-content p { color: #6d28d9; }

        /* ===== DATA TABLE ===== */
        .data-table-wrapper {
            overflow-x: auto;
            border-radius: var(--radius);
            border: 1px solid var(--gray-200);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table thead {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .data-table thead th {
            color: var(--white);
            font-weight: 600;
            padding: 14px 16px;
            text-align: left;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--gray-100);
            transition: background 0.15s ease;
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: rgba(37,99,235,0.03);
        }

        .data-table tbody tr:nth-child(even) {
            background: var(--gray-50);
        }

        .data-table tbody tr:nth-child(even):hover {
            background: rgba(37,99,235,0.04);
        }

        .data-table td {
            padding: 13px 16px;
            color: var(--gray-700);
            vertical-align: top;
            line-height: 1.5;
        }

        .data-table td:first-child {
            font-weight: 600;
            color: var(--gray-800);
        }

        .badge-tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }

        .badge-blue { background: rgba(37,99,235,0.1); color: var(--primary-dark); }
        .badge-green { background: rgba(16,185,129,0.1); color: #065f46; }
        .badge-orange { background: rgba(245,158,11,0.1); color: #92400e; }
        .badge-purple { background: rgba(139,92,246,0.1); color: #4c1d95; }

        /* ===== RIGHTS GRID ===== */
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .right-card {
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            padding: 20px;
            transition: all 0.2s ease;
        }

        .right-card:hover {
            border-color: var(--primary);
            background: rgba(37,99,235,0.03);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .right-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .right-card-icon {
            width: 38px;
            height: 38px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .right-card-icon svg {
            width: 18px;
            height: 18px;
            fill: var(--white);
        }

        .right-card h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .right-card p {
            font-size: 13px;
            color: var(--gray-600);
            line-height: 1.6;
            margin: 0 !important;
        }

        /* ===== ARTICLE REFERENCE ===== */
        .article-ref {
            background: linear-gradient(135deg, rgba(37,99,235,0.06), rgba(14,165,233,0.04));
            border: 1px solid rgba(37,99,235,0.2);
            border-radius: var(--radius);
            padding: 20px;
        }

        .article-ref-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .article-ref-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            font-size: 12px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            letter-spacing: 0.5px;
        }
