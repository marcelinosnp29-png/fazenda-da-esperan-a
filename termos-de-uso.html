<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termos de Uso - Fazenda da Esperança</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --secondary: #0ea5e9;
            --dark: #1e293b;
            --light: #f8fafc;
            --gray: #64748b;
            --border: #e2e8f0;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(37, 99, 235, 0.3);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--white);
            line-height: 1.2;
        }

        .logo-tagline {
            font-size: 11px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 0.5px;
        }

        nav {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        nav a:hover {
            background: rgba(255,255,255,0.15);
            color: var(--white);
        }

        .btn-whatsapp-header {
            background: rgba(255,255,255,0.2);
            color: var(--white) !important;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px !important;
            border-radius: 8px;
            font-weight: 600 !important;
            transition: all 0.2s !important;
        }

        .btn-whatsapp-header:hover {
            background: rgba(255,255,255,0.3) !important;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            flex-direction: column;
            gap: 5px;
            padding: 4px;
        }

        .menu-toggle span {
            display: block;
            width: 24px;
            height: 2px;
            background: var(--white);
            border-radius: 2px;
            transition: all 0.3s;
        }

        /* ===== PAGE HERO ===== */
        .page-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 60px 24px 50px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .page-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%);
        }

        .page-hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
        }

        .page-hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: var(--white);
            font-size: 12px;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .page-hero h1 {
            font-size: clamp(28px, 4vw, 42px);
            font-weight: 800;
            color: var(--white);
            margin-bottom: 14px;
            line-height: 1.2;
        }

        .page-hero p {
            font-size: 16px;
            color: rgba(255,255,255,0.85);
            max-width: 560px;
            margin: 0 auto 20px;
        }

        .vigencia-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--white);
            font-size: 13px;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 8px;
        }

        /* ===== BREADCRUMB ===== */
        .breadcrumb {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
        }

        .breadcrumb-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray);
        }

        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .breadcrumb span {
            color: var(--gray);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 24px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
            align-items: start;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: sticky;
            top: 90px;
        }

        .sidebar-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .sidebar-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 20px;
            color: var(--white);
        }

        .sidebar-header h3 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            opacity: 0.85;
        }

        .sidebar-nav {
            padding: 12px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: var(--dark);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .sidebar-nav a:hover {
            background: #eff6ff;
            color: var(--primary);
            border-left-color: var(--primary);
        }

        .sidebar-nav a .nav-icon {
            width: 20px;
            height: 20px;
            background: #eff6ff;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
        }

        .sidebar-nav a:hover .nav-icon {
            background: var(--primary);
            color: var(--white);
        }

        .sidebar-info {
            margin-top: 20px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .sidebar-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .info-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-value {
            font-size: 13px;
            color: var(--dark);
            font-weight: 500;
        }

        .info-value a {
            color: var(--primary);
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }

        /* ===== CONTENT ===== */
        .content-area {
            min-width: 0;
        }

        .terms-section {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 24px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            scroll-margin-top: 90px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 24px 28px;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
            border-bottom: 1px solid var(--border);
        }

        .section-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .section-title-group h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 2px;
        }

        .section-title-group p {
            font-size: 13px;
            color: var(--gray);
        }

        .section-body {
            padding: 28px;
        }

        .section-body p {
            font-size: 15px;
            color: #374151;
            margin-bottom: 16px;
            line-height: 1.75;
        }

        .section-body p:last-child {
            margin-bottom: 0;
        }

        .section-body h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark);
            margin: 24px 0 12px;
            padding-left: 12px;
            border-left: 3px solid var(--primary);
        }

        .section-body h3:first-child {
            margin-top: 0;
        }

        /* ===== LISTS ===== */
        .terms-list {
            list-style: none;
            margin: 12px 0 16px;
        }

        .terms-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 14px;
            margin-bottom: 6px;
            background: #f8fafc;
            border-radius: 8px;
            font-size: 14px;
            color: #374151;
            line-height: 1.6;
            border: 1px solid var(--border);
        }

        .terms-list li::before {
            content: '✓';
            color: var(--primary);
            font-weight: 700;
            font-size: 13px;
            margin-top: 1px;
            flex-shrink: 0;
        }

        .terms-list.prohibited li::before {
            content: '✕';
            color: #ef4444;
        }

        .terms-list.info li::before {
            content: '→';
            color: var(--secondary);
        }

        .terms-list.numbered {
            counter-reset: list-counter;
        }

        .terms-list.numbered li {
            counter-increment: list-counter;
        }

        .terms-list.numbered li::before {
            content: counter(list-counter);
            background: var(--primary);
            color: var(--white);
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
            flex-shrink: 0;
        }

        /* ===== HIGHLIGHT BOX ===== */
        .highlight-box {
            background: linear-gradient(135deg, #eff6ff 0%, #e0f2fe 100%);
            border: 1px solid #bfdbfe;
            border-left: 4px solid var(--primary);
            border-radius: 10px;
            padding: 18px 20px;
            margin: 16px 0;
        }

        .highlight-box.warning {
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            border-color: #fcd34d;
            border-left-color: #f59e0b;
        }

        .highlight-box.success {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border-color: #86efac;
            border-left-color: #22c55e;
        }

        .highlight-box.danger {
            background: linear-gradient(135deg, #fff1f2 0%, #ffe4e6 100%);
            border-color: #fecdd3;
            border-left-color: #ef4444;
        }

        .highlight-box p {
            font-size: 14px !important;
            margin-bottom: 0 !important;
            color: #1e3a5f !important;
        }

        .highlight-box.warning p {
            color: #78350f !important;
        }

        .highlight-box.success p {
            color: #14532d !important;
        }

        .highlight-box.danger p {
            color: #7f1d1d !important;
        }

        .highlight-box strong {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ===== DATA TABLE ===== */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .data-table thead {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
        }

        .data-table thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .data-table tbody tr:last-child {
            border-bottom: none;
        }

        .data-table tbody tr:hover {
            background: #f8fafc;
        }

        .data-table tbody td {
            padding: 12px 16px;
            color: #374151;
            vertical-align: top;
        }

        .data-table tbody td:first-child {
            font-weight: 600;
            color: var(--dark);
        }

        .tag {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .tag-blue {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .tag-green {
            background: #dcfce7;
            color: #15803d;
        }

        .tag-orange {
            background: #ffedd5;
            color: #c2410c;
        }

        .tag-gray {
            background: #f1f5f9;
            color: #475569;
        }

        /* ===== RIGHTS GRID ===== */
        .rights-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 16px 0;
        }

        .right-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: all 0.2s;
        }

        .right-card:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .right-card-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .right-card h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .right-card p {
            font-size: 12px !important;
            color: var(--gray) !important;
            margin-bottom: 0 !important;
            line-height: 1.5 !important;
        }

        .right-card .art-ref {
            display: inline-block;
            margin-top: 8px;
            font-size: 10px;
            font-weight: 600;
            color: var(--primary);
            background: #dbeafe;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* ===== COOKIE TABLE ===== */
        .cookie-grid {
            display: grid;
            gap: 10px;
            margin: 16px 0;
        }

        .cookie-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 14px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .cookie-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .cookie-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 3px;
        }

        .cookie-info p {
            font-size: 12px !important;
            color: var(--gray) !important;
            margin-bottom: 0 !important;
        }

        /* ===== RETENTION TABLE ===== */
        .retention-grid {
            display: grid;
            gap: 10px;
            margin: 16px 0;
        }

        .retention-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .retention-period {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
            text-align: center;
            min-width: 70px;
        }

        .retention-info h4 {
            font-size: 13px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 3px;
        }

        .retention-info p {
            font-size: 12px;
            color: var(--gray);
        }

        /* ===== CONTACT CARD ===== */
        .contact-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            color: var(--white);
            margin-top: 8px;
        }

        .contact-card h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .contact-card p {
            font-size: 15px;
            opacity: 0.9;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .contact-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-primary-contact {
            background: var(--white);
            color: var(--primary);
        }

        .btn-primary-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .btn-secondary-contact {
            background: rgba(255,255,255,0.15);
            color: var(--white);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn-secondary-contact:hover {
            background: rgba(255,255,255,0.25);
        }

        /* ===== ACCEPTANCE SECTION ===== */
        .acceptance-section {
            background: var(--white);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 28px;
            margin-top: 24px;
            text-align: center;
        }

        .acceptance-section h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 12px;
        }

        .acceptance-section p {
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .acceptance-check {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 14px 20px;
            margin-bottom: 16px;
        }

        .acceptance-check span {
            font-size: 14px;
            font-weight: 600;
            color: #15803d;
        }

        /* ===== FOOTER ===== */
        footer {
            background: var(--dark);
            color: rgba(255,255,255,0.7);
            padding: 60px 24px 0;
            margin-top: 60px;
        }

        .footer-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .footer-brand .logo-name {
            color: var(--white);
            font-size: 20px;
        }

        .footer-brand .logo-tagline {
            color: rgba(255,255,255,0.5);
        }

        .footer-brand p {
            font-size: 14px;
            line-height: 1.7;
            margin-top: 14px;
            color: rgba(255,255,255,0.6);
        }

        .footer-social {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .social-btn {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 16px;
            transition: all 0.2s;
        }

        .social-btn:hover {
            background: var(--primary);
            color: var(--white);
        }

        .footer-col h4 {
            font-size: 14px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: 10px;
        }

        .footer-col ul li a {
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-col ul li a::before {
            content: '→';
            font-size: 11px;
            color: var(--secondary);
        }

        .footer-col ul li a:hover {
            color: var(--white);
        }

        .footer-contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
