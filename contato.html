<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fale Conosco | Fazenda da Esperança</title>
<meta name="description" content="Entre em contato com a Fazenda da Esperança. Estamos prontos para atender voluntários e acolhidos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --success: #22c55e;
    --error: #ef4444;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
    --radius: 0.5rem;
    --radius-lg: 1rem;
    --radius-xl: 1.5rem;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    color: var(--gray-900);
  }
  .logo-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.25rem;
    flex-shrink: 0;
  }
  .logo-text { display: flex; flex-direction: column; line-height: 1.2; }
  .logo-name { font-weight: 700; font-size: 1rem; color: var(--gray-900); }
  .logo-sub { font-size: 0.7rem; color: var(--gray-500); font-weight: 400; }
  nav { display: flex; align-items: center; gap: 0.25rem; }
  nav a {
    text-decoration: none;
    color: var(--gray-600);
    font-size: 0.875rem;
    font-weight: 500;
    padding: 0.5rem 0.75rem;
    border-radius: var(--radius);
    transition: all 0.2s;
  }
  nav a:hover, nav a.active { color: var(--primary); background: rgba(37,99,235,0.08); }
  .btn-nav {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white) !important;
    padding: 0.5rem 1.25rem !important;
    border-radius: 2rem !important;
    font-weight: 600 !important;
    transition: all 0.2s !important;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .btn-nav:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.4) !important; background: var(--white) !important; color: var(--primary) !important; border: 1px solid var(--primary); }
  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: var(--radius);
  }
  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: all 0.3s;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-menu {
    display: none;
    position: absolute;
    top: 70px;
    left: 0;
    right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 1rem 1.5rem;
    flex-direction: column;
    gap: 0.25rem;
    box-shadow: var(--shadow-md);
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    text-decoration: none;
    color: var(--gray-700);
    font-weight: 500;
    padding: 0.75rem 1rem;
    border-radius: var(--radius);
    transition: all 0.2s;
  }
  .mobile-menu a:hover, .mobile-menu a.active { color: var(--primary); background: rgba(37,99,235,0.08); }

  /* ===== PAGE HERO ===== */
  .page-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 4rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .page-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 60%),
                radial-gradient(circle at 70% 20%, rgba(255,255,255,0.05) 0%, transparent 50%);
  }
  .page-hero-content { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
  .page-hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(255,255,255,0.15);
    color: var(--white);
    padding: 0.4rem 1rem;
    border-radius: 2rem;
    font-size: 0.8rem;
    font-weight: 600;
    margin-bottom: 1.25rem;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  .page-hero h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--white);
    margin-bottom: 1rem;
    line-height: 1.2;
  }
  .page-hero p {
    font-size: 1.1rem;
    color: rgba(255,255,255,0.85);
    max-width: 550px;
    margin: 0 auto;
  }
  .breadcrumb {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.7);
  }
  .breadcrumb a { color: rgba(255,255,255,0.85); text-decoration: none; transition: color 0.2s; }
  .breadcrumb a:hover { color: var(--white); }
  .breadcrumb span { color: rgba(255,255,255,0.5); }

  /* ===== MAIN CONTENT ===== */
  .contact-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 4rem 1.5rem;
  }
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.6fr;
    gap: 3rem;
    align-items: start;
  }

  /* ===== INFO CARDS ===== */
  .info-column { display: flex; flex-direction: column; gap: 1.5rem; }
  .info-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    box-shadow: var(--shadow-sm);
    transition: all 0.3s;
  }
  .info-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .info-card-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .info-card-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    flex-shrink: 0;
  }
  .icon-blue { background: rgba(37,99,235,0.1); color: var(--primary); }
  .icon-sky { background: rgba(14,165,233,0.1); color: var(--secondary); }
  .icon-green { background: rgba(34,197,94,0.1); color: #16a34a; }
  .icon-purple { background: rgba(139,92,246,0.1); color: #7c3aed; }
  .info-card h3 { font-size: 1rem; font-weight: 700; color: var(--gray-900); }
  .info-card p, .info-card a {
    font-size: 0.875rem;
    color: var(--gray-600);
    text-decoration: none;
    line-height: 1.7;
  }
  .info-card a:hover { color: var(--primary); }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 0.875rem;
    color: var(--gray-700);
  }
  .contact-item:last-child { border-bottom: none; }
  .contact-item-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
  .contact-item a { color: var(--gray-700); text-decoration: none; transition: color 0.2s; }
  .contact-item a:hover { color: var(--primary); }
  .hours-grid { display: flex; flex-direction: column; gap: 0.5rem; }
  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
    border-bottom: 1px solid var(--gray-100);
    font-size: 0.85rem;
  }
  .hours-row:last-child { border-bottom: none; }
  .hours-day { color: var(--gray-600); font-weight: 500; }
  .hours-time { color: var(--gray-800); font-weight: 600; }
  .badge-open {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(34,197,94,0.1);
    color: #16a34a;
    padding: 0.2rem 0.6rem;
    border-radius: 2rem;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-open::before { content: '●'; font-size: 0.5rem; animation: pulse-dot 2s infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* ===== MAP ===== */
  .map-placeholder {
    background: linear-gradient(135deg, var(--gray-100), var(--gray-200));
    border-radius: var(--radius-lg);
    height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    border: 2px dashed var(--gray-300);
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    color: var(--gray-600);
  }
  .map-placeholder:hover { border-color: var(--primary); background: rgba(37,99,235,0.05); color: var(--primary); }
  .map-icon { font-size: 2.5rem; }
  .map-placeholder p { font-size: 0.875rem; font-weight: 600; }
  .map-placeholder small { font-size: 0.75rem; color: var(--gray-400); }

  /* ===== FORM ===== */
  .form-card {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-xl);
    padding: 2.5rem;
    box-shadow: var(--shadow-md);
  }
  .form-header { margin-bottom: 2rem; }
  .form-header h2 { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); margin-bottom: 0.5rem; }
  .form-header p { font-size: 0.9rem; color: var(--gray-500); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--gray-700);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  label .required { color: var(--error); margin-left: 2px; }
  input, select, textarea {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    color: var(--gray-800);
    background: var(--gray-50);
    transition: all 0.2s;
    outline: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    background: var(--white);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  input::placeholder, textarea::placeholder { color: var(--gray-400); }
  input.error, select.error, textarea.error { border-color: var(--error); box-shadow: 0 0 0 3px rgba(239,68,68,0.1); }
  .error-msg { font-size: 0.75rem; color: var(--error); display: none; }
  .error-msg.show { display: block; }
  textarea { resize: vertical; min-height: 130px; }
  .char-count { font-size: 0.72rem; color: var(--gray-400); text-align: right; margin-top: 0.2rem; }
  .form-privacy {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    padding: 1rem;
    background: var(--gray-50);
    border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    margin-top: 0.5rem;
  }
  .form-privacy input[type="checkbox"] {
    width: 18px;
    height: 18px;
    min-width: 18px;
    margin-top: 1px;
    accent-color: var(--primary);
    cursor: pointer;
    padding: 0;
    border: none;
    box-shadow: none;
    background: none;
  }
  .form-privacy input[type="checkbox"]:focus { box-shadow: none; border: none; }
  .form-privacy label {
    font-size: 0.8rem;
    color: var(--gray-600);
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    cursor: pointer;
  }
  .form-privacy a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .form-privacy a:hover { text-decoration: underline; }
  .btn-submit {
    width: 100%;
    padding: 0.9rem 2rem;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(37,99,235,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.25rem;
  }
  .btn-submit:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37,99,235,0.4); }
  .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .form-success {
    display: none;
    text-align: center;
    padding: 2rem;
  }
  .form-success .success-icon {
    width: 70px;
    height: 70px;
    background: rgba(34,197,94,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.25rem;
  }
  .form-success h3 { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); margin-bottom: 0.5rem; }
  .form-success p { color: var(--gray-500); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .btn-reset {
    padding: 0.65rem 1.75rem;
    background: var(--primary);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    font-family: 'Inter', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-reset:hover { background: var(--primary-dark); }

  /* ===== SOCIAL STRIP ===== */
  .social-section {
    background: var(--gray-50);
    border-top: 1px solid var(--gray-200);
    border-bottom: 1px solid var(--gray-200);
    padding: 2.5rem 1.5rem;
    text-align: center;
  }
  .social-section h3 { font-size: 1.1rem; font-weight: 700; color: var(--gray-800); margin-bottom: 1.5rem; }
  .social-links { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
  .social-link {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.65rem 1.25rem;
    border-radius: var(--radius);
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    border: 1.5px solid transparent;
  }
  .social-link:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .social-yt { background: #ff0000; color: var(--white); }
  .social-yt:hover { background: #cc0000; }
  .social-wa { background: #25d366; color: var(--white); }
  .social-wa:hover { background: #1da851; }
  .social-ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); color: var(--white); }
  .social-ig:hover { opacity: 0.9; }
  .social-fb { background: #1877f2; color: var(--white); }
  .social-fb:hover { background: #1565c0; }

  /* ===== FOOTER ===== */
  footer {
    background: var(--gray-900);
    color: var(--gray-400);
    padding: 3.5rem 1.5rem 1.5rem;
  }
  .footer-inner {
    max-width: 1200px;
    margin: 0 auto;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 2.5rem;
    padding-bottom: 2.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .footer-brand .logo { margin-bottom: 1rem; }
  .footer-brand .logo-name { color: var(--white); }
  .footer-brand .logo-sub { color: var(--gray-500); }
  .footer-brand p { font-size: 0.875rem; line-height: 1.7; color: var(--gray-400); margin-bottom: 1.25rem; }
  .footer-social { display: flex; gap: 0.5rem; }
  .footer-social a {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.06);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-400);
    text-decoration: none;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .footer-social a:hover { background: var(--primary); color: var(--white); }
  .footer-col h4 { font-size: 0.875rem; font-weight: 700; color: var(--white); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
  .footer-col ul li a {
    font-size: 0.875rem;
    color: var(--gray-400);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer-col ul li a:hover { color: var(--white); }
  .footer-bottom {
    padding-top: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .footer-bottom p { font-size: 0.8rem; }
  .footer-bottom a { color: var(--gray-400); text-decoration: none; }
  .footer-bottom a:hover { color: var(--white); }
  .footer-badges { display: flex; gap: 0.5rem; }
  .footer-badge {
    background: rgba(255,255,255,0.06);
    padding: 0.3rem 0.75rem;
    border-radius: 2rem;
    font-size: 0.7rem;
    color: var(--gray-500);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* ===== WHATSAPP FLOAT ===== */
  .whatsapp-float {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0.75rem;
  }
  .whatsapp-tooltip {
    background: var(--gray-900);
    color: var(--white);
    padding: 0.5rem 1rem;
    border-radius: var(--radius);
    font-size: 0.8rem;
    font-weight: 500;
    white-space: nowrap;
    opacity: 0;
    transform: translateX(10px);
    transition: all 0.3s;
    pointer-events: none;
    box-shadow: var(--shadow-md);
  }
  .whatsapp-float:hover .whatsapp-tooltip { opacity: 1; transform: translateX(0); }
  .whatsapp-btn {
    width: 58px;
    height: 58px;
    background: #25d366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.6rem;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,0.4);
    transition: all 0.3s;
    animation: float-pulse 3s ease-in-out infinite;
  }
  .whatsapp-btn:hover { transform: scale(1.1); box-shadow: 0 6px 25px rgba(37,211,102,0.5); }
  @keyframes float-pulse {
    0%, 100% { box-shadow: 0 4px 20px rgba(37,211,102,0.4); }
    50% { box-shadow: 0 4px 30px rgba(37,211,102,0.6); }
  }

  /* ===== LGPD BANNER ===== */
  .lgpd-banner {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 9999;
    background: var(--gray-900);
    color: var(--gray-300);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    flex-wrap: wrap;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
    transform: translateY(100%);
    transition: transform 0.4s ease;
  }
