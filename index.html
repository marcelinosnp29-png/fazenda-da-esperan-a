  <style>
    :root {
      --primary: #2563eb;
      --secondary: #0ea5e9;
      --primary-dark: #1d4ed8;
      --secondary-dark: #0284c7;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-300: #cbd5e1;
      --gray-400: #94a3b8;
      --gray-500: #64748b;
      --gray-600: #475569;
      --gray-700: #334155;
      --gray-800: #1e293b;
      --gray-900: #0f172a;
      --success: #10b981;
      --error: #ef4444;
      --font: 'Poppins', sans-serif;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow: 0 4px 6px rgba(0,0,0,0.07), 0 2px 4px rgba(0,0,0,0.06);
      --shadow-md: 0 10px 15px rgba(0,0,0,0.1), 0 4px 6px rgba(0,0,0,0.05);
      --shadow-lg: 0 20px 25px rgba(0,0,0,0.1), 0 10px 10px rgba(0,0,0,0.04);
      --shadow-xl: 0 25px 50px rgba(0,0,0,0.15);
      --radius: 12px;
      --radius-lg: 20px;
      --radius-full: 9999px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font);
      color: var(--gray-800);
      background: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    button { cursor: pointer; border: none; background: none; font-family: var(--font); }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .section-title {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      color: var(--gray-900);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .section-subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      color: var(--gray-500);
      max-width: 580px;
      line-height: 1.7;
    }

    .section-header {
      text-align: center;
      margin-bottom: 48px;
    }

    .section-header .section-subtitle {
      margin: 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(14,165,233,0.1));
      color: var(--primary);
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-full);
      margin-bottom: 16px;
      border: 1px solid rgba(37,99,235,0.2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: var(--radius-full);
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      transition: var(--transition);
      cursor: pointer;
      border: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--white);
      box-shadow: 0 4px 15px rgba(37,99,235,0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(37,99,235,0.5);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.15);
      color: var(--white);
      border: 2px solid rgba(255,255,255,0.4);
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* ===== HEADER ===== */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(37,99,235,0.1);
      transition: var(--transition);
    }

    #header.scrolled {
      box-shadow: var(--shadow-md);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 70px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--gray-900);
    }

    .logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .logo-text span {
      display: block;
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--gray-500);
      line-height: 1;
    }

    .nav {
      display: none;
      align-items: center;
      gap: 32px;
    }

    .nav a {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-600);
      transition: var(--transition);
      position: relative;
      padding-bottom: 4px;
    }

    .nav a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      border-radius: 2px;
      transition: var(--transition);
    }

    .nav a:hover {
      color: var(--primary);
    }

    .nav a:hover::after {
      width: 100%;
    }

    .header-cta {
      display: none;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 8px;
      cursor: pointer;
      border-radius: 8px;
      transition: var(--transition);
    }

    .hamburger:hover {
      background: var(--gray-100);
    }

    .hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--gray-700);
      border-radius: 2px;
      transition: var(--transition);
    }

    .hamburger.active span:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0);
    }

    .hamburger.active span:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    .mobile-menu {
      display: none;
      position: fixed;
      top: 70px;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--gray-200);
      padding: 20px;
      z-index: 999;
      box-shadow: var(--shadow-lg);
    }

    .mobile-menu.open {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mobile-menu a {
      display: block;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--gray-700);
      border-radius: var(--radius);
      transition: var(--transition);
      margin-bottom: 4px;
    }

    .mobile-menu a:hover {
      background: var(--gray-100);
      color: var(--primary);
    }

    .mobile-menu .mobile-cta {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
    }

    /* ===== HERO ===== */
    #hero {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      padding: 100px 0 60px;
    }

    #hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 600px;
      height: 600px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    #hero::after {
      content: '';
      position: absolute;
      bottom: -30%;
      left: -10%;
      width: 400px;
      height: 400px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: var(--radius-full);
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .hero-title {
      font-size: clamp(2rem, 6vw, 3.8rem);
      font-weight: 800;
      color: white;
      line-height: 1.15;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    .hero-title span {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: rgba(255,255,255,0.85);
      max-width: 600px;
      margin: 0 auto 36px;
      line-height: 1.7;
    }

    .hero-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-bottom: 48px;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .hero-stat {
      text-align: center;
      color: white;
    }

    .hero-stat-number {
      display: block;
      font-size: 1.8rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 4px;
    }

    .hero-stat-label {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
      font-weight: 400;
    }

    .hero-scroll {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
      animation: bounce 2s infinite;
    }

    .hero-scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.6), transparent);
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* ===== SOBRE ===== */
    #sobre {
      padding: 80px 0;
      background: var(--white);
    }

    .sobre-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
    }

    .sobre-visual {
      position: relative;
    }

    .sobre-card-main {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: var(--radius-lg);
      padding: 40px;
      color: white;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .sobre-card-main::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .sobre-icon-big {
      font-size: 4rem;
      margin-bottom: 16px;
      display: block;
    }

    .sobre-card-main h3 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .sobre-card-main p {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .sobre-cards-small {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    .sobre-card-small {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      transition: var(--transition);
    }

    .sobre-card-small:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .sobre-card-small .icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    .sobre-card-small p {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--gray-700);
    }

    .sobre-text .badge {
      margin-bottom: 16px;
    }

    .sobre-text p {
      font-size: 0.95rem;
      color: var(--gray-600);
      line-height: 1.8;
      margin-bottom: 16px;
    }

    .sobre-features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .sobre-feature {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .sobre-feature-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(14,165,233,0.1));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .sobre-feature-text h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--gray-800);
      margin-bottom: 2px;
    }

    .sobre-feature-text p {
      font-size: 0.82rem;
      color: var(--gray-500);
      margin: 0;
      line-height: 1.5;
    }

    /* ===== CURSOS ===== */
    #cursos {
      padding: 80px 0;
      background: var(--gray-50);
    }

    .cursos-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .curso-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: var(--transition);
      border: 1px solid var(--gray-200);
    }

    .curso-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-xl);
      border-color: rgba(37,99,235,0.2);
    }

    .curso-thumbnail {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: var(--gray-200);
      overflow: hidden;
    }

    .curso-thumbnail iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .curso-thumbnail-placeholder {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
      transition: var(--transition);
    }

    .curso-thumbnail-placeholder:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--secondary-dark));
    }

    .play-btn {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 12px;
      border: 2px solid rgba(255,255,255,0.4);
      transition: var(--transition);
    }

    .curso-thumbnail-placeholder:hover .play-btn {
      background: rgba(255,255,255,0.3);
      transform: scale(1.1);
    }

    .curso-thumbnail-placeholder span {
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .curso-body {
      padding: 20px;
    }

    .curso-category {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: linear-gradient(135deg, rgba(37,99,235,0.1), rgba(14,165,233,0.1));
      color: var(--primary);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--radius-full);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .curso-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .curso-desc {
      font-size: 0.85rem;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .curso-meta {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 0.78rem;
      color: var(--gray-400);
    }

    .curso-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .curso-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .curso-free {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .curso-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      transition: var(--transition);
    }

    .curso-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37,99,235,0.4);
    }

    /* ===== TRILHAS ===== */
    #trilhas {
      padding: 80px 0;
      background: var(--white);
    }

    .trilhas-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .trilha-card {
      background: var(--gray-50);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .trilha-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transform: scaleX(0);
      transform-origin: left;
      transition: var(--transition);
    }

    .trilha-card:hover {
      border-color: rgba(37,99,235,0.3);
      box-shadow: var(--shadow-md);
      transform: translateY(-4px);
    }

    .trilha-card:hover::before {
      transform: scaleX(1);
    }

    .trilha-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 16px;
    }

    .trilha-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .trilha-info h3 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gray-900);
      margin-bottom: 4px;
    }

    .trilha-info p {
      font-size: 0.82rem;
      color: var(--gray-500);
    }

    .trilha-desc {
      font-size: 0.88rem;
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 16px;
    }

    .trilha-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .trilha-topic {
