<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nossos Serviços | Fazenda da Esperança</title>
<meta name="description" content="Conheça os cursos online da Fazenda da Esperança. Aprenda com qualidade, flexibilidade e suporte profissional.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --dark: #0f172a;
    --gray-900: #1e293b;
    --gray-700: #334155;
    --gray-500: #64748b;
    --gray-300: #cbd5e1;
    --gray-100: #f1f5f9;
    --white: #ffffff;
    --gradient: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
    --shadow-sm: 0 1px 3px rgba(0,0,0,.1);
    --shadow-md: 0 4px 16px rgba(0,0,0,.12);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.16);
    --radius: 12px;
    --transition: .3s ease;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-900);
    background: var(--white);
    line-height: 1.6;
    overflow-x: hidden;
  }

  img { max-width: 100%; display: block; }
  a { text-decoration: none; color: inherit; }
  ul { list-style: none; }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255,255,255,.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--gray-300);
    box-shadow: var(--shadow-sm);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 800;
    font-size: 1.25rem;
    color: var(--primary);
  }

  .logo-icon {
    width: 42px;
    height: 42px;
    background: var(--gradient);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--white);
    font-size: 1.2rem;
  }

  nav { display: flex; align-items: center; gap: 32px; }

  nav a {
    font-size: .95rem;
    font-weight: 500;
    color: var(--gray-700);
    transition: color var(--transition);
    position: relative;
  }

  nav a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 0;
    height: 2px;
    background: var(--gradient);
    transition: width var(--transition);
  }

  nav a:hover { color: var(--primary); }
  nav a:hover::after { width: 100%; }
  nav a.active { color: var(--primary); }
  nav a.active::after { width: 100%; }

  .btn-nav {
    background: var(--gradient);
    color: var(--white) !important;
    padding: 10px 22px;
    border-radius: 50px;
    font-weight: 600;
    font-size: .9rem;
    transition: opacity var(--transition), transform var(--transition);
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
  }

  .btn-nav:hover { opacity: .9; transform: translateY(-1px); }
  .btn-nav::after { display: none !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 4px;
    background: none;
    border: none;
  }

  .hamburger span {
    display: block;
    width: 26px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: all var(--transition);
  }

  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  .mobile-menu {
    display: none;
    position: absolute;
    top: 70px;
    left: 0;
    right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-300);
    padding: 20px 24px;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--shadow-md);
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    font-size: 1rem;
    font-weight: 500;
    color: var(--gray-700);
    padding: 8px 0;
    border-bottom: 1px solid var(--gray-100);
    transition: color var(--transition);
  }

  .mobile-menu a:hover { color: var(--primary); }

  /* ── HERO BANNER ── */
  .hero-services {
    background: var(--gradient);
    padding: 80px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero-services::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -20%;
    width: 600px;
    height: 600px;
    background: rgba(255,255,255,.06);
    border-radius: 50%;
  }

  .hero-services::after {
    content: '';
    position: absolute;
    bottom: -40%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: rgba(255,255,255,.05);
    border-radius: 50%;
  }

  .hero-services .container { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,.2);
    color: var(--white);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: .85rem;
    font-weight: 600;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,.3);
  }

  .hero-services h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    color: var(--white);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .hero-services p {
    font-size: 1.1rem;
    color: rgba(255,255,255,.9);
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── CONTAINER ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  section { padding: 80px 0; }

  .section-header { text-align: center; margin-bottom: 56px; }

  .section-tag {
    display: inline-block;
    background: rgba(37,99,235,.1);
    color: var(--primary);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 12px;
  }

  .section-header h2 {
    font-size: clamp(1.6rem, 3.5vw, 2.4rem);
    font-weight: 800;
    color: var(--dark);
    margin-bottom: 14px;
    line-height: 1.25;
  }

  .section-header p {
    font-size: 1.05rem;
    color: var(--gray-500);
    max-width: 580px;
    margin: 0 auto;
  }

  /* ── CURSOS CARDS ── */
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 28px;
  }

  .course-card {
    background: var(--white);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--gray-100);
    transition: transform var(--transition), box-shadow var(--transition);
    display: flex;
    flex-direction: column;
  }

  .course-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow-lg);
  }

  .course-thumb {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: var(--gray-100);
    overflow: hidden;
  }

  .course-thumb iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: none;
  }

  .course-thumb .play-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background var(--transition);
  }

  .course-thumb .play-overlay:hover { background: rgba(0,0,0,.2); }

  .play-btn {
    width: 60px;
    height: 60px;
    background: var(--white);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.3);
    transition: transform var(--transition);
  }

  .play-btn:hover { transform: scale(1.1); }

  .play-btn svg { margin-left: 4px; }

  .course-level {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: .75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
  }

  .level-iniciante { background: #dcfce7; color: #166534; }
  .level-intermediario { background: #fef9c3; color: #854d0e; }
  .level-avancado { background: #fee2e2; color: #991b1b; }

  .course-body {
    padding: 24px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .course-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 12px;
  }

  .course-meta span {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: .8rem;
    color: var(--gray-500);
    font-weight: 500;
  }

  .course-body h3 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 10px;
    line-height: 1.35;
  }

  .course-body p {
    font-size: .9rem;
    color: var(--gray-500);
    line-height: 1.65;
    margin-bottom: 16px;
    flex: 1;
  }

  .course-topics {
    margin-bottom: 20px;
  }

  .course-topics h4 {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--gray-700);
    margin-bottom: 8px;
  }

  .course-topics li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .85rem;
    color: var(--gray-500);
    padding: 3px 0;
  }

  .course-topics li::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--secondary);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .course-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--gray-100);
    gap: 12px;
    flex-wrap: wrap;
  }

  .course-price {
    display: flex;
    flex-direction: column;
  }

  .price-label {
    font-size: .75rem;
    color: var(--gray-500);
    font-weight: 500;
  }

  .price-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: var(--primary);
    line-height: 1;
  }

  .price-free {
    font-size: 1.2rem;
    font-weight: 800;
    color: #16a34a;
  }

  .btn-course {
    background: var(--gradient);
    color: var(--white);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: .88rem;
    font-weight: 600;
    transition: opacity var(--transition), transform var(--transition);
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(37,99,235,.3);
  }

  .btn-course:hover { opacity: .9; transform: translateY(-1px); }

  /* ── COMO FUNCIONA ── */
  .how-it-works { background: var(--gray-100); }

  .steps-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 32px;
    position: relative;
  }

  .step-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-100);
    position: relative;
    transition: transform var(--transition), box-shadow var(--transition);
  }

  .step-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }

  .step-number {
    width: 52px;
    height: 52px;
    background: var(--gradient);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--white);
    margin: 0 auto 16px;
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
  }

  .step-icon {
    font-size: 2rem;
    margin-bottom: 12px;
  }

  .step-card h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 8px;
  }

  .step-card p {
    font-size: .88rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ── DIFERENCIAIS ── */
  .benefits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
  }

  .benefit-item {
    display: flex;
    gap: 16px;
    padding: 24px;
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--gray-100);
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition), box-shadow var(--transition);
  }

  .benefit-item:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }

  .benefit-icon {
    width: 48px;
    height: 48px;
    background: rgba(37,99,235,.1);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .benefit-text h3 {
    font-size: 1rem;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
  }

  .benefit-text p {
    font-size: .875rem;
    color: var(--gray-500);
    line-height: 1.6;
  }

  /* ── PLANOS ── */
  .plans-section { background: var(--gray-100); }

  .plans-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
    align-items: start;
  }

  .plan-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 36px 28px;
    border: 2px solid var(--gray-100);
    box-shadow: var(--shadow-sm);
    transition: transform var(--transition), box-shadow var(--transition);
    position: relative;
    overflow: hidden;
  }

  .plan-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-lg); }

  .plan-card.featured {
    border-color: var(--primary);
    box-shadow: 0 8px 32px rgba(37,99,235,.2);
  }

  .plan-badge {
    position: absolute;
    top: 16px;
    right: -28px;
    background: var(--gradient);
    color: var(--white);
    font-size: .75rem;
    font-weight: 700;
    padding: 4px 40px;
    transform: rotate(35deg);
    letter-spacing: .05em;
  }

  .plan-icon {
    font-size: 2.5rem;
    margin-bottom: 16px;
  }

  .plan-name {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--gray-700);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .plan-price {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 6px;
  }

  .plan-currency { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
  .plan-amount { font-size: 2.8rem; font-weight: 800; color: var(--primary); line-height: 1; }
  .plan-period { font-size: .9rem; color: var(--gray-500); }

  .plan-desc {
    font-size: .875rem;
    color: var(--gray-500);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  .plan-features { margin-bottom: 28px; }

  .plan-features li {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    font-size: .88rem;
    color: var(--gray-700);
    border-bottom: 1px solid var(--gray-100);
  }

  .plan-features li:last-child { border-bottom: none; }

  .check-icon { color: #16a34a; font-size: 1rem; flex-shrink: 0; }
  .x-icon { color: var(--gray-300); font-size: 1rem; flex-shrink: 0; }

  .btn-plan {
    display: block;
    text-align: center;
    padding: 13px;
    border-radius: 10px;
    font-weight: 700;
    font-size: .95rem;
    transition: all var(--transition);
  }

  .btn-plan-outline {
    border: 2px solid var(--primary);
    color: var(--primary);
  }

  .btn-plan-outline:hover { background: var(--primary); color: var(--white); }

  .btn-plan-filled {
    background: var(--gradient);
    color: var(--white);
    box-shadow: 0 4px 14px rgba(37,99,235,.35);
  }

  .btn-plan-filled:hover { opacity: .9; transform: translateY(-1px); }

  /* ── FAQ ── */
  .faq-list { max-width: 800px; margin: 0 auto; }

  .faq-item {
    border: 1px solid var(--gray-300);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: box-shadow var(--transition);
  }

  .faq-item:hover { box-shadow: var(--shadow-sm); }

  .faq-question {
    width: 100%;
    background: var(--white);
    border: none;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    cursor: pointer;
    text-align: left;
    transition: background var(--transition);
  }

  .faq-question:hover { background: var(--gray-100); }

  .faq-question.active { background: rgba(37,99,235,.05); }

  .faq-question span {
    font-size: .98rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1.4;
  }

  .faq-icon {
    width: 28px;
    height: 28px;
    background: var(--gray-100);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
    color: var(--primary);
    font-size: 1.1rem;
    font-weight: 700;
  }

  .faq-question.active .faq-icon {
    background: var(--primary);
    color: var(--white);
    transform: rotate(45deg);
  }

  .faq-answer {
    max-height: 0;
    overflow: hidden;
    transition: max-height .4s ease, padding .3s ease;
  }

  .faq-answer.open { max-height: 300px; }

  .faq-answer-inner {
    padding: 0 24px 20px;
    font-size: .92rem;
    color: var(--gray-500);
    line-height: 1.7;
  }

  /* ── CTA FINAL ── */
  .cta-section {
    background: var(--gradient);
    text-align: center;
    padding: 80px 24px;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    top: -60%;
    right: -10%;
    width: 500px;
    height: 500px;
    background: rgba(255,255,255,.06);
    border-radius: 50%;
  }

  .cta-section .container { position: relative; z-index: 1; }

  .cta-section h2 {
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    font-weight: 800;
    color: var(--white);
    margin-bottom: 14px;
  }

  .cta-section p {
    font-size: 1.05rem;
    color: rgba(255,255,255,.9);
    max-width: 560px;
    margin: 0 auto 32px;
  }

  .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

  .btn-cta-white {
    background: var(--white);
    color: var(--primary);
    padding: 14px 32px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    transition: all var(--transition);
    box-shadow: 0 4px 20px rgba(0,0,0,.2);
  }

  .btn-cta-white:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,0,0,.25); }

  .btn-cta-outline {
    background: transparent;
    color: var(--white);
    padding: 14px 32px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 1rem;
    border: 2px solid rgba(255,255,255,.7);
    transition: all var(--transition);
  }

  .btn-cta-outline:hover { background: rgba(255,255,255,.15); border-color: var(--white); }

  /* ── FOOTER ── */
  footer {
    background: var(--dark);
    color: rgba(255,255,255,.8);
    padding: 60px 0 0;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 40px;
    padding-bottom: 48px;
  }

  .footer-brand .logo { color: var(--white); margin-bottom: 14px; }

  .footer-brand p {
    font-size: .88rem;
    line-height: 1.7;
    color: rgba(255,255,255,.6);
    margin-bottom: 20px;
  }

  .social-links { display: flex; gap: 10px; }

  .social-link {
    width: 38px;
    height: 38px;
    background: rgba(255,255,255,.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    transition: background var(--transition), transform var(--transition);
  }

  .social-link:hover { background: var(--primary); transform: translateY(-2px); }

  .footer-col h4 {
    font-size: .9rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  .footer-col ul { display: flex; flex-direction: column; gap: 10px; }

  .footer-col ul li a {
    font-size: .875rem;
    color: rgba(255,255,255,.6);
    transition: color var(--transition);
  }

  .footer-col ul li a:hover { color: var(--secondary); }

  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,.1);
    padding: 20px 0;
