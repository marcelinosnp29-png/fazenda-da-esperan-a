<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Conteúdo - Fazenda da Esperança Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #2d6a4f;
    --primary-dark: #1b4332;
    --primary-light: #40916c;
    --accent: #74c69d;
    --accent-light: #b7e4c7;
    --sidebar-bg: #1b4332;
    --sidebar-text: #d8f3dc;
    --sidebar-hover: #2d6a4f;
    --sidebar-active: #40916c;
    --bg: #f0f4f1;
    --card: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6b7280;
    --border: #e2e8f0;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --info: #3b82f6;
    --sidebar-width: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    transition: transform .3s ease;
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,.1);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--primary-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .sidebar-logo .logo-text h2 {
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
  }

  .sidebar-logo .logo-text span {
    color: var(--accent-light);
    font-size: 11px;
    font-weight: 400;
  }

  .sidebar-nav {
    padding: 16px 0;
    flex: 1;
  }

  .nav-section-title {
    color: rgba(255,255,255,.4);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 8px 20px 4px;
    margin-top: 8px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    color: var(--sidebar-text);
    text-decoration: none;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all .2s;
  }

  .nav-item:hover {
    background: var(--sidebar-hover);
    color: #fff;
  }

  .nav-item.active {
    background: var(--sidebar-active);
    color: #fff;
    border-left-color: var(--accent);
  }

  .nav-item i { width: 18px; text-align: center; font-size: 14px; }

  .nav-badge {
    margin-left: auto;
    background: var(--accent);
    color: var(--primary-dark);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,.1);
  }

  .sidebar-user {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--primary-light));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: #fff; font-weight: 700;
    flex-shrink: 0;
  }

  .user-info .user-name { color: #fff; font-size: 13px; font-weight: 600; }
  .user-info .user-role { color: var(--accent-light); font-size: 11px; }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-width);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-left h1 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .topbar-left .breadcrumb {
    font-size: 12px;
    color: var(--text-muted);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }

  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: var(--border); }

  .btn-danger {
    background: #fee2e2;
    color: var(--danger);
    border: 1px solid #fecaca;
  }

  .btn-danger:hover { background: #fecaca; }

  .btn-success {
    background: var(--success);
    color: #fff;
  }

  .btn-success:hover { background: #059669; }

  .btn-sm { padding: 5px 11px; font-size: 12px; }

  .btn:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none !important;
  }

  /* ── CONTENT ── */
  .content {
    padding: 28px;
    flex: 1;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── STATS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stat-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stat-icon.green { background: #d1fae5; color: var(--primary); }
  .stat-icon.blue { background: #dbeafe; color: var(--info); }
  .stat-icon.yellow { background: #fef3c7; color: var(--warning); }
  .stat-icon.red { background: #fee2e2; color: var(--danger); }

  .stat-info .stat-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-info .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* ── TABLE ── */
  .table-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .table-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .table-header h3 {
    font-size: 15px;
    font-weight: 700;
  }

  .table-filters {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
  }

  .search-box i { color: var(--text-muted); font-size: 13px; }

  .search-box input {
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: var(--text);
    width: 200px;
    font-family: 'Inter', sans-serif;
  }

  .filter-select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--bg);
    padding: 11px 18px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .6px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .15s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fffe; }

  tbody td {
    padding: 13px 18px;
    font-size: 13.5px;
    vertical-align: middle;
  }

  .post-title-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .post-thumb {
    width: 44px; height: 34px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .post-thumb-placeholder {
    width: 44px; height: 34px;
    border-radius: 6px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    font-size: 12px;
    flex-shrink: 0;
  }

  .post-title-text {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
    line-height: 1.3;
  }

  .post-slug-text {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-published { background: #d1fae5; color: #065f46; }
  .badge-draft { background: #fef3c7; color: #92400e; }
  .badge-archived { background: #f3f4f6; color: #6b7280; }
  .badge-page { background: #dbeafe; color: #1e40af; }
  .badge-post { background: #ede9fe; color: #5b21b6; }

  .row-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .action-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: all .2s;
  }

  .action-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
  .action-btn.delete:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: .4; }
  .empty-state p { font-size: 14px; }

  /* ── EDITOR ── */
  .editor-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  .editor-main, .editor-sidebar-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .panel-header i { color: var(--primary); }

  .panel-body { padding: 18px; }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group:last-child { margin-bottom: 0; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 6px;
  }

  .form-control {
    width: 100%;
    padding: 9px 13px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }

  .form-control:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(45,106,79,.12);
    background: #fff;
  }

  .form-control.title-input {
    font-size: 18px;
    font-weight: 700;
    padding: 12px 14px;
  }

  textarea.form-control {
    resize: vertical;
    min-height: 80px;
  }

  .slug-group {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .slug-prefix {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-right: none;
    border-radius: 8px 0 0 8px;
    padding: 9px 12px;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .slug-group .form-control {
    border-radius: 0 8px 8px 0;
  }

  .char-count {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 4px;
  }

  .char-count.warn { color: var(--warning); }
  .char-count.over { color: var(--danger); }

  /* Quill editor */
  #editor-container {
    border-radius: 0 0 8px 8px;
  }

  .ql-toolbar.ql-snow {
    border: 1.5px solid var(--border) !important;
    border-bottom: none !important;
    border-radius: 8px 8px 0 0;
    background: var(--bg);
  }

  .ql-container.ql-snow {
    border: 1.5px solid var(--border) !important;
    border-radius: 0 0 8px 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 320px;
  }

  .ql-editor { min-height: 320px; }

  /* Image upload */
  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }

  .image-upload-area:hover {
    border-color: var(--primary);
    background: #f0faf4;
  }

  .image-upload-area.has-image {
    padding: 0;
    border-style: solid;
  }

  .image-upload-area img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 8px;
    display: block;
  }

  .image-upload-area .upload-icon { font-size: 28px; color: var(--text-muted); margin-bottom: 8px; }
  .image-upload-area .upload-text { font-size: 13px; color: var(--text-muted); }
  .image-upload-area .upload-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .image-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.5);
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .image-upload-area.has-image:hover .image-overlay { display: flex; }

  .image-overlay button {
    background: rgba(255,255,255,.9);
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 5px;
  }

  #featured-image-input { display: none; }

  /* Status select */
  .status-select-wrapper {
    position: relative;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
  }

  .status-dot.published { background: var(--success); }
  .status-dot.draft { background: var(--warning); }
  .status-dot.archived { background: var(--text-muted); }

  /* SEO preview */
  .seo-preview {
    background: var(--bg);
    border-radius: 8px;
    padding: 14px;
    margin-top: 12px;
    border: 1px solid var(--border);
  }

  .seo-preview-url {
    font-size: 12px;
    color: #1a6a00;
    margin-bottom: 3px;
    word-break: break-all;
  }

  .seo-preview-title {
    font-size: 16px;
    color: #1a0dab;
    font-weight: 400;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .seo-preview-desc {
    font-size: 13px;
    color: #4d5156;
    line-height: 1.5;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--card);
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,.15);
    border-left: 4px solid var(--success);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    min-width: 280px;
    animation: slideIn .3s ease;
  }

  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }
  .toast.info { border-left-color: var(--info); }

  .toast i { font-size: 16px; }
  .toast.success i { color: var(--success); }
  .toast.error i { color: var(--danger); }
  .toast.warning i { color: var(--warning); }
  .toast.info i { color: var(--info); }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.8);
    z-index: 9998;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .loading-overlay.active { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 9000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
  }

  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
  .modal p { font-size: 14px; color: var(--text-muted); margin-bottom: 22px; line-height: 1.5; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Responsive */
  @media (max-width: 1100px) {
    .editor-layout { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .topbar { padding: 0 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: var(--text);
    padding: 4px;
  }

  @media (max-width: 768px) {
    .mobile-menu-btn { display: flex; }
  }

  /* Pagination */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-muted);
  }

  .pagination-btns {
    display: flex;
    gap: 4px;
  }

  .page-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    transition: all .2s;
  }

  .page-btn:hover, .page-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .page-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* Config panel */
  .config-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .config-row:last-child { border-bottom: none; }

  /* Toggle switch */

    position: relative;
    width: 40px; height: 22px;
    flex-shrink: 0;
  }

  .toggle input { display: none; }

  .toggle-slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: .3s;
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #fff;
    border-radius: 50%;
    transition: .3s;
  }

  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

  .slug-edit-btn {

    border: none;

    font-size: 11px;
    cursor: pointer;
    padding: 0 4px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
  }

    margin-top: 4px;
