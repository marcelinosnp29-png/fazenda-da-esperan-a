<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Conteúdo - Fazenda da Esperança Admin</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
  :root {
    --green-dark: #1a4a2e;
    --green-mid: #2d7a4f;
    --green-light: #4caf7d;
    --green-pale: #e8f5ee;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --sidebar-w: 280px;
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --red: #ef4444;
    --red-light: #fef2f2;
    --blue: #3b82f6;
    --blue-light: #eff6ff;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 12px rgba(0,0,0,.12);
    --shadow-lg: 0 8px 24px rgba(0,0,0,.16);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    display: flex;
    min-height: 100vh;
    font-size: 14px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--green-dark);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    overflow-y: auto;
    transition: transform .3s;
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,.1);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .sidebar-logo .logo-text h2 {
    color: var(--white);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: .3px;
  }

  .sidebar-logo .logo-text span {
    color: var(--gold-light);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .sidebar-section {
    padding: 16px 12px 8px;
  }

  .sidebar-section-label {
    color: rgba(255,255,255,.4);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    padding: 0 8px;
    margin-bottom: 6px;
  }

  .sidebar-nav a {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    color: rgba(255,255,255,.7);
    text-decoration: none;
    font-size: 13.5px;
    transition: all .2s;
    cursor: pointer;
  }

  .sidebar-nav a:hover {
    background: rgba(255,255,255,.08);
    color: var(--white);
  }

  .sidebar-nav a.active {
    background: var(--green-mid);
    color: var(--white);
    font-weight: 600;
  }

  .sidebar-nav a i {
    width: 18px;
    text-align: center;
    font-size: 14px;
  }

  .sidebar-nav a .badge {
    margin-left: auto;
    background: var(--gold);
    color: var(--green-dark);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,.1);
  }

  .sidebar-footer .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background .2s;
  }

  .sidebar-footer .user-info:hover { background: rgba(255,255,255,.08); }

  .user-avatar {
    width: 34px; height: 34px;
    background: var(--green-mid);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--white);
    font-weight: 700;
    font-size: 13px;
    flex-shrink: 0;
  }

  .user-details { flex: 1; min-width: 0; }
  .user-details strong {
    display: block;
    color: var(--white);
    font-size: 12.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .user-details small {
    color: rgba(255,255,255,.5);
    font-size: 11px;
  }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOP BAR ── */
  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 28px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }

  .topbar-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-800);
    flex: 1;
  }

  .topbar-title span {
    color: var(--green-mid);
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all .2s;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--green-mid);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-secondary {
    background: var(--gray-100);
    color: var(--gray-700);
    border: 1px solid var(--gray-200);
  }
  .btn-secondary:hover { background: var(--gray-200); }

  .btn-danger {
    background: var(--red-light);
    color: var(--red);
    border: 1px solid #fecaca;
  }
  .btn-danger:hover { background: var(--red); color: var(--white); }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-dark);
  }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-icon { padding: 8px; width: 36px; height: 36px; justify-content: center; }

  /* ── CONTENT ── */
  .content {
    padding: 28px;
    flex: 1;
  }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── STATS CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .stat-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .stat-icon.green { background: var(--green-pale); color: var(--green-mid); }
  .stat-icon.gold { background: #fef9e7; color: var(--gold); }
  .stat-icon.blue { background: var(--blue-light); color: var(--blue); }
  .stat-icon.red { background: var(--red-light); color: var(--red); }

  .stat-info strong {
    display: block;
    font-size: 22px;
    font-weight: 800;
    color: var(--gray-800);
    line-height: 1;
  }
  .stat-info small { color: var(--gray-500); font-size: 12px; }

  /* ── POSTS LIST ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .card-header h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-800);
    flex: 1;
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gray-100);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 6px 12px;
    min-width: 220px;
  }

  .search-box i { color: var(--gray-400); font-size: 13px; }
  .search-box input {
    border: none;
    background: transparent;
    outline: none;
    font-size: 13px;
    color: var(--gray-700);
    width: 100%;
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
    background: var(--gray-100);
    padding: 3px;
    border-radius: var(--radius-sm);
  }

  .filter-tab {
    padding: 5px 12px;
    border-radius: 5px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--gray-500);
    transition: all .2s;
  }

  .filter-tab.active {
    background: var(--white);
    color: var(--green-mid);
    box-shadow: var(--shadow-sm);
  }

  .posts-table { width: 100%; border-collapse: collapse; }

  .posts-table th {
    background: var(--gray-50);
    padding: 10px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--gray-500);
    border-bottom: 1px solid var(--gray-200);
  }

  .posts-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
  }

  .posts-table tr:last-child td { border-bottom: none; }

  .posts-table tr:hover td { background: var(--gray-50); }

  .post-thumb {
    width: 48px; height: 36px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--gray-200);
    display: flex; align-items: center; justify-content: center;
    color: var(--gray-400);
    font-size: 16px;
    flex-shrink: 0;
  }

  .post-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 6px;
  }

  .post-info { display: flex; align-items: center; gap: 12px; }

  .post-title-cell strong {
    display: block;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--gray-800);
    margin-bottom: 2px;
  }

  .post-title-cell small {
    color: var(--gray-400);
    font-size: 11.5px;
    font-family: monospace;
  }

  .badge-status {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .badge-status::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .badge-status.published { background: #dcfce7; color: #16a34a; }
  .badge-status.draft { background: #fef9c3; color: #ca8a04; }
  .badge-status.archived { background: var(--gray-100); color: var(--gray-500); }
  .badge-status.page { background: var(--blue-light); color: var(--blue); }

  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }

  .type-badge.post { background: var(--green-pale); color: var(--green-mid); }
  .type-badge.page { background: var(--blue-light); color: var(--blue); }

  .actions-cell { display: flex; gap: 6px; align-items: center; }

  .empty-state {
    padding: 60px 20px;
    text-align: center;
    color: var(--gray-400);
  }

  .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: 14px; }

  /* ── EDITOR LAYOUT ── */
  .editor-layout {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 20px;
    align-items: start;
  }

  .editor-main { display: flex; flex-direction: column; gap: 16px; }
  .editor-sidebar { display: flex; flex-direction: column; gap: 16px; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-label {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--gray-600);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-label .required { color: var(--red); }

  .form-input, .form-select, .form-textarea {
    width: 100%;
    padding: 9px 13px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 13.5px;
    color: var(--gray-800);
    background: var(--white);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    font-family: inherit;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,122,79,.12);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .slug-group {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }

  .slug-group:focus-within {
    border-color: var(--green-mid);
    box-shadow: 0 0 0 3px rgba(45,122,79,.12);
  }

  .slug-prefix {
    background: var(--gray-100);
    padding: 9px 10px;
    font-size: 12px;
    color: var(--gray-500);
    border-right: 1px solid var(--gray-200);
    white-space: nowrap;
  }

  .slug-group input {
    flex: 1;
    border: none;
    outline: none;
    padding: 9px 13px;
    font-size: 13px;
    color: var(--gray-800);
    font-family: monospace;
  }

  .char-count {
    font-size: 11px;
    color: var(--gray-400);
    text-align: right;
    margin-top: 3px;
  }

  .char-count.warn { color: #f59e0b; }
  .char-count.over { color: var(--red); }

  /* Quill */
  .quill-wrapper {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    overflow: hidden;
    transition: border-color .2s;
  }

  .quill-wrapper:focus-within { border-color: var(--green-mid); }

  #editor-container {
    min-height: 340px;
    font-size: 14px;
    font-family: 'Segoe UI', sans-serif;
  }

  .ql-toolbar.ql-snow { border: none; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); }
  .ql-container.ql-snow { border: none; }
  .ql-editor { min-height: 300px; }

  /* Image upload */
  .image-upload-area {
    border: 2px dashed var(--gray-300);
    border-radius: var(--radius-sm);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    background: var(--gray-50);
    position: relative;
  }

  .image-upload-area:hover {
    border-color: var(--green-mid);
    background: var(--green-pale);
  }

  .image-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }

  .image-upload-area i { font-size: 24px; color: var(--gray-400); margin-bottom: 8px; display: block; }
  .image-upload-area p { font-size: 12.5px; color: var(--gray-500); }
  .image-upload-area small { font-size: 11px; color: var(--gray-400); }

  .image-preview {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: none;
  }

  .image-preview img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }

  .image-preview .remove-img {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(0,0,0,.6);
    color: var(--white);
    border: none;
    border-radius: 50%;
    width: 26px; height: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    transition: background .2s;
  }

  .image-preview .remove-img:hover { background: var(--red); }

  /* SEO preview */
  .seo-preview {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin-top: 8px;
  }

  .seo-preview .seo-url { color: #1a0dab; font-size: 12px; margin-bottom: 3px; }
  .seo-preview .seo-title { color: #1a0dab; font-size: 16px; font-weight: 400; margin-bottom: 2px; line-height: 1.3; }
  .seo-preview .seo-desc { color: #4d5156; font-size: 13px; line-height: 1.4; }

  /* Status select */
  .status-select-wrapper {
    position: relative;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--gray-50);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    margin-bottom: 10px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.published { background: #16a34a; }
  .status-dot.draft { background: #ca8a04; }
  .status-dot.archived { background: var(--gray-400); }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    border-left: 4px solid var(--green-mid);
    min-width: 280px;
    max-width: 380px;
    animation: slideIn .3s ease;
    font-size: 13px;
  }

  .toast.error { border-left-color: var(--red); }
  .toast.warning { border-left-color: var(--gold); }

  .toast i { font-size: 16px; }
  .toast.success i { color: var(--green-mid); }
  .toast.error i { color: var(--red); }
  .toast.warning i { color: var(--gold); }

  .toast-close {
    margin-left: auto;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--gray-400);
    font-size: 14px;
    padding: 2px;
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: var(--radius);
    padding: 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    animation: fadeUp .25s ease;
  }

  @keyframes fadeUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h3 { font-size: 17px; margin-bottom: 10px; }
  .modal p { color: var(--gray-600); font-size: 13.5px; margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

  /* Loading */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,.8);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
  }

  .loading-overlay.show { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--gray-200);
    border-top-color: var(--green-mid);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 1024px) {
    .editor-layout { grid-template-columns: 1fr; }
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .divider {
    height: 1px;
    background: var(--gray-200);
    margin: 4px 0;
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .page-header h2 {
    font-size: 20px;
    font-weight: 800;
    color: var(--gray-800);
  }

  .page-header .breadcrumb {
    font-size: 12.5px;
    color: var(--gray-500);
