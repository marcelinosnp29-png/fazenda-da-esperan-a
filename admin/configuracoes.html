<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - Admin Fazenda da Esperança</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #2d6a4f;
    --primary-dark: #1b4332;
    --primary-light: #52b788;
    --accent: #f4a261;
    --accent-dark: #e76f51;
    --bg: #f0f4f0;
    --sidebar-bg: #1b4332;
    --sidebar-text: #d8f3dc;
    --sidebar-hover: #2d6a4f;
    --sidebar-active: #52b788;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-muted: #6c757d;
    --border: #dee2e6;
    --success: #28a745;
    --danger: #dc3545;
    --warning: #ffc107;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 10px;
    --transition: all 0.25s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    color: var(--sidebar-text);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: var(--transition);
    overflow-y: auto;
  }

  .sidebar-logo {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo .logo-icon {
    width: 44px; height: 44px;
    background: var(--primary-light);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }

  .sidebar-logo .logo-text {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.3;
    color: #fff;
  }

  .sidebar-logo .logo-sub {
    font-size: 10px;
    color: var(--sidebar-active);
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 0;
  }

  .nav-section {
    padding: 8px 20px 4px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    font-weight: 600;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    cursor: pointer;
    transition: var(--transition);
    font-size: 14px;
    color: var(--sidebar-text);
    text-decoration: none;
    border-left: 3px solid transparent;
  }

  .nav-item:hover {
    background: var(--sidebar-hover);
    color: #fff;
  }

  .nav-item.active {
    background: rgba(82,183,136,0.2);
    border-left-color: var(--sidebar-active);
    color: var(--sidebar-active);
    font-weight: 600;
  }

  .nav-item .nav-icon { font-size: 18px; width: 22px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }

  /* ── MAIN ── */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: var(--shadow);
  }

  .topbar-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .topbar-title h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary-dark);
  }

  .topbar-title .breadcrumb {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    padding: 9px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: var(--transition);
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-primary:hover {
    background: var(--primary-dark);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(45,106,79,0.3);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: #e9ecef; }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }

  .btn-sm { padding: 6px 14px; font-size: 13px; }

  /* ── CONTENT ── */
  .content {
    padding: 32px;
    flex: 1;
  }

  /* ── TABS ── */
  .tabs-wrapper {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .tabs-header {
    display: flex;
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs-header::-webkit-scrollbar { display: none; }

  .tab-btn {
    padding: 16px 24px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    transition: var(--transition);
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab-btn:hover { color: var(--primary); background: rgba(45,106,79,0.04); }

  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 700;
    background: rgba(45,106,79,0.05);
  }

  .tab-icon { font-size: 17px; }

  .tab-panel {
    display: none;
    padding: 32px;
    animation: fadeIn 0.2s ease;
  }

  .tab-panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── FORM ELEMENTS ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-grid-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  .form-full { grid-column: 1 / -1; }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-group label .badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 600;
  }

  .badge-optional {
    background: #e9ecef;
    color: var(--text-muted);
  }

  .badge-required {
    background: #ffeeba;
    color: #856404;
  }

  .form-control {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    transition: var(--transition);
    width: 100%;
  }

  .form-control:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
  }

  .form-control::placeholder { color: #adb5bd; }

  textarea.form-control {
    resize: vertical;
    min-height: 90px;
  }

  .form-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--bg);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title + .form-grid,
  .section-title + .form-group { margin-top: 0; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: var(--bg);
    margin: 28px 0;
  }

  /* ── SOCIAL ITEM ── */
  .social-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 10px;
    margin-bottom: 12px;
    border: 1.5px solid transparent;
    transition: var(--transition);
  }

  .social-item:hover { border-color: var(--primary-light); }

  .social-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .social-item .form-control { background: #fff; }

  /* ── INTEGRATION CARD ── */
  .integration-card {
    background: var(--bg);
    border-radius: 12px;
    padding: 20px;
    border: 1.5px solid var(--border);
    margin-bottom: 16px;
    transition: var(--transition);
  }

  .integration-card:hover { border-color: var(--primary-light); }

  .integration-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .integration-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .integration-logo {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .integration-name { font-size: 15px; font-weight: 700; }
  .integration-desc { font-size: 12px; color: var(--text-muted); }

  /* ── TOGGLE ── */
  .toggle-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle {
    position: relative;
    width: 44px; height: 24px;
    flex-shrink: 0;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc;
    border-radius: 24px;
    transition: var(--transition);
  }

  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

  .toggle-label { font-size: 13px; font-weight: 600; }

  /* ── COLOR PICKER ── */
  .color-section {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .color-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 14px;
    border: 1.5px solid var(--border);
    transition: var(--transition);
  }

  .color-item:hover { border-color: var(--primary-light); }

  .color-item label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: block;
  }

  .color-picker-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .color-input {
    width: 44px; height: 44px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    padding: 2px;
    background: none;
    flex-shrink: 0;
  }

  .color-hex {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: monospace;
    color: var(--text);
    background: #fff;
    transition: var(--transition);
  }

  .color-hex:focus {
    outline: none;
    border-color: var(--primary-light);
  }

  /* ── PREVIEW ── */
  .preview-wrapper {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 24px;
    background: #f8f9fa;
  }

  .preview-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-site {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  }

  .preview-nav {
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .preview-nav-logo { font-weight: 800; font-size: 15px; }

  .preview-nav-links { display: flex; gap: 16px; }

  .preview-nav-link { font-size: 12px; font-weight: 500; }

  .preview-hero {
    padding: 40px 20px;
    text-align: center;
  }

  .preview-hero h2 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .preview-hero p { font-size: 13px; margin-bottom: 16px; }

  .preview-btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }

  .preview-footer {
    padding: 12px 20px;
    text-align: center;
    font-size: 11px;
  }

  /* ── FONT SELECTOR ── */
  .font-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .font-option {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
    background: #fff;
  }

  .font-option:hover { border-color: var(--primary-light); }
  .font-option.selected { border-color: var(--primary); background: rgba(45,106,79,0.05); }

  .font-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .font-preview { font-size: 18px; }

  /* ── LOGO UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--bg);
  }

  .upload-area:hover { border-color: var(--primary-light); background: rgba(82,183,136,0.05); }

  .upload-icon { font-size: 36px; margin-bottom: 10px; }
  .upload-text { font-size: 14px; font-weight: 600; color: var(--text); }
  .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

  /* ── ALERT ── */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
  .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  .alert-info { background: #cce5ff; color: #004085; border: 1px solid #b8daff; }

  /* ── TOAST ── */
  .toast-container {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    background: #fff;
    border-radius: 10px;
    padding: 14px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 280px;
    animation: toastIn 0.3s ease;
    border-left: 4px solid var(--success);
  }

  .toast.error { border-left-color: var(--danger); }
  .toast.warning { border-left-color: var(--warning); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(100%); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast-icon { font-size: 20px; }
  .toast-msg { font-size: 14px; font-weight: 500; flex: 1; }
  .toast-close { cursor: pointer; color: var(--text-muted); font-size: 18px; }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9998;
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SEO COUNTER ── */
  .char-counter {
    font-size: 11px;
    text-align: right;
    margin-top: 4px;
    font-weight: 600;
  }

  .counter-ok { color: var(--success); }
  .counter-warn { color: var(--warning); }
  .counter-bad { color: var(--danger); }

  /* ── STATUS BADGE ── */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
  }

  .status-active { background: #d4edda; color: #155724; }
  .status-inactive { background: #f8d7da; color: #721c24; }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .sidebar { width: 220px; }
    .main { margin-left: 220px; }
    .form-grid, .form-grid-3 { grid-template-columns: 1fr; }
    .form-full { grid-column: 1; }
    .font-grid { grid-template-columns: 1fr 1fr; }
    .color-section { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 680px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .tab-panel { padding: 20px; }
    .font-grid { grid-template-columns: 1fr; }
    .color-section { grid-template-columns: 1fr; }
  }

  /* ── MISC ── */
  .flex-row { display: flex; align-items: center; gap: 12px; }
  .mt-16 { margin-top: 16px; }
  .mb-16 { margin-bottom: 16px; }
  .text-muted { color: var(--text-muted); font-size: 13px; }

  .whatsapp-preview {
    background: #075e54;
    border-radius: 12px;
    padding: 16px;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 12px;
  }

  .wa-icon { font-size: 32px; }
  .wa-text { font-size: 13px; }
  .wa-number { font-size: 16px; font-weight: 700; }

  .keyword-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .keyword-tag {
    background: rgba(45,106,79,0.1);
    color: var(--primary);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    border: 1px solid rgba(45,106,79,0.2);
  }

  .keyword-tag:hover { background: rgba(220,53,69,0.1); color: var(--danger); }

  .keyword-input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .keyword-input-row .form-control { flex: 1; }

  .info-box {
    background: #e8f4fd;
    border: 1px solid #bee3f8;
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #2c5282;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .info-box-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🌿</div>
    <div>
      <div class="logo-text">Fazenda da<br>Esperança</div>
      <div class="logo-sub">Admin Panel</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="#">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">📰</span> Notícias
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">🏡</span> Fazendas
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">🙏</span> Testemunhos
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">📅</span> Eventos
    </a>
    <a class="nav-item" href="#">
      <span class="nav-icon">💰</span> Doações
