<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configurações - Admin Fazenda da Esperança</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #2d6a4f;
    --primary-dark: #1b4332;
    --primary-light: #52b788;
    --accent: #f4a261;
    --accent-dark: #e76f51;
    --bg: #f0f4f0;
    --sidebar-bg: #1b4332;
    --card-bg: #ffffff;
    --text: #1a1a2e;
    --text-light: #6b7280;
    --border: #d1d5db;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --radius: 12px;
    --transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    min-height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: 260px;
    background: var(--sidebar-bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0; top: 0; bottom: 0;
    z-index: 100;
    transition: var(--transition);
  }

  .sidebar-logo {
    padding: 28px 20px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-logo .logo-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--primary-light), var(--accent));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 10px;
  }

  .sidebar-logo h2 {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }

  .sidebar-logo span {
    color: var(--primary-light);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
    overflow-y: auto;
  }

  .nav-section-label {
    color: rgba(255,255,255,0.4);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 8px 8px 4px;
    font-weight: 600;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: rgba(255,255,255,0.7);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: var(--transition);
    cursor: pointer;
    margin-bottom: 2px;
  }

  .nav-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
  }

  .nav-item.active {
    background: rgba(82,183,136,0.2);
    color: var(--primary-light);
    font-weight: 600;
  }

  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .user-info {
    display: flex;
    align-items: center;
    gap: 10px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
  }

  .user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--primary-light), var(--accent));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }

  /* ===== MAIN ===== */
  .main {
    margin-left: 260px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--card-bg);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }

  .topbar-left h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary-dark);
  }

  .topbar-left p {
    font-size: 13px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    box-shadow: 0 4px 12px rgba(45,106,79,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(45,106,79,0.4);
  }

  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover { background: #e5e7eb; }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    color: #fff;
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
  }

  /* ===== CONTENT ===== */
  .content {
    padding: 32px;
    flex: 1;
  }

  /* ===== TABS ===== */
  .tabs-container {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .tabs-header {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs-header::-webkit-scrollbar { display: none; }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 16px 22px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-light);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--primary); background: rgba(45,106,79,0.04); }

  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 600;
    background: rgba(45,106,79,0.04);
  }

  .tab-btn .tab-icon { font-size: 16px; }

  .tab-panel { display: none; padding: 32px; }
  .tab-panel.active { display: block; }

  /* ===== FORM ELEMENTS ===== */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  .form-grid-3 {
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  label .required { color: var(--error); margin-left: 2px; }

  .form-hint {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 2px;
  }

  input[type="text"],
  input[type="email"],
  input[type="url"],
  input[type="tel"],
  input[type="number"],
  textarea,
  select {
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    transition: var(--transition);
    font-family: inherit;
    width: 100%;
  }

  input:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
  }

  textarea { resize: vertical; min-height: 90px; }

  .input-with-icon {
    position: relative;
  }

  .input-with-icon .icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-light);
    pointer-events: none;
  }

  .input-with-icon input { padding-left: 38px; }

  .char-count {
    font-size: 11px;
    color: var(--text-light);
    text-align: right;
    margin-top: 2px;
  }

  .char-count.warn { color: var(--warning); }
  .char-count.over { color: var(--error); }

  /* ===== SECTION HEADERS ===== */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, rgba(45,106,79,0.1), rgba(82,183,136,0.15));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .section-header h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--primary-dark);
  }

  .section-header p {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 1px;
  }

  /* ===== DIVIDER ===== */
  .form-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* ===== SOCIAL ITEMS ===== */
  .social-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px;
    background: var(--bg);
    border-radius: 10px;
    border: 1.5px solid var(--border);
    transition: var(--transition);
  }

  .social-item:hover { border-color: var(--primary-light); }

  .social-badge {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .social-badge.facebook { background: #1877f2; }
  .social-badge.instagram { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .social-badge.youtube { background: #ff0000; }
  .social-badge.twitter { background: #1da1f2; }
  .social-badge.linkedin { background: #0077b5; }
  .social-badge.tiktok { background: #000; }
  .social-badge.whatsapp { background: #25d366; }

  .social-info { flex: 1; }
  .social-info label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
  .social-info input { margin: 0; }

  /* ===== INTEGRATION CARDS ===== */
  .integration-card {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: var(--transition);
  }

  .integration-card:hover { border-color: var(--primary-light); box-shadow: 0 2px 12px rgba(45,106,79,0.08); }

  .integration-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .integration-title {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .integration-logo {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    font-weight: 700;
  }

  .integration-logo.ga { background: #e37400; color: #fff; font-size: 12px; }
  .integration-logo.pixel { background: #1877f2; color: #fff; }
  .integration-logo.wa { background: #25d366; color: #fff; }
  .integration-logo.rc { background: #4285f4; color: #fff; }

  .integration-title h4 { font-size: 14px; font-weight: 700; }
  .integration-title p { font-size: 11px; color: var(--text-light); }

  /* ===== TOGGLE ===== */
  .toggle-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle {
    position: relative;
    width: 44px; height: 24px;
  }

  .toggle input { opacity: 0; width: 0; height: 0; }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #cbd5e1;
    border-radius: 24px;
    transition: var(--transition);
  }

  .toggle-slider:before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; bottom: 3px;
    background: #fff;
    border-radius: 50%;
    transition: var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .toggle input:checked + .toggle-slider { background: var(--primary); }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); }

  .toggle-label { font-size: 13px; color: var(--text-light); }

  /* ===== COLOR PICKER ===== */
  .color-section {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .color-item {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: var(--transition);
  }

  .color-item:hover { border-color: var(--primary-light); }

  .color-item label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: block;
    margin-bottom: 10px;
  }

  .color-picker-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="color"] {
    width: 44px; height: 44px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    padding: 2px;
    background: none;
  }

  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

  .color-hex {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: 'Courier New', monospace;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    width: 90px;
  }

  .color-preview-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
  }

  /* ===== PREVIEW ===== */
  .preview-container {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-top: 24px;
  }

  .preview-label {
    padding: 12px 16px;
    background: var(--primary-dark);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .preview-site {
    padding: 20px;
    background: #fff;
  }

  .preview-navbar {
    height: 52px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    margin-bottom: 16px;
    transition: background 0.3s;
  }

  .preview-navbar-logo {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }

  .preview-navbar-title {
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    flex: 1;
  }

  .preview-nav-links {
    display: flex;
    gap: 8px;
  }

  .preview-nav-link {
    color: rgba(255,255,255,0.8);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
  }

  .preview-hero {
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 16px;
    text-align: center;
    transition: background 0.3s;
  }

  .preview-hero h2 {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }

  .preview-hero p {
    font-size: 12px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 14px;
  }

  .preview-btn {
    display: inline-block;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    color: #fff;
    transition: background 0.3s;
  }

  .preview-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .preview-card {
    border-radius: 8px;
    padding: 14px;
    text-align: center;
    transition: background 0.3s;
  }

  .preview-card-icon { font-size: 20px; margin-bottom: 6px; }
  .preview-card-title { font-size: 11px; font-weight: 700; color: #fff; }
  .preview-card-text { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: 2px; }

  /* ===== FONT SELECTOR ===== */
  .font-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 10px;
  }

  .font-option {
    padding: 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: var(--transition);
    background: #fff;
  }

  .font-option:hover { border-color: var(--primary-light); }
  .font-option.selected { border-color: var(--primary); background: rgba(45,106,79,0.05); }

  .font-option input { display: none; }
  .font-option-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .font-option-preview { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  /* ===== SEO PREVIEW ===== */
  .seo-preview {
    background: #fff;
    border: 1px solid #dadce0;
    border-radius: 8px;
    padding: 16px 20px;
    margin-top: 16px;
    font-family: Arial, sans-serif;
  }

  .seo-preview-url {
    font-size: 12px;
    color: #202124;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .seo-preview-url .favicon {
    width: 16px; height: 16px;
    background: var(--primary);
    border-radius: 2px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #fff;
  }

  .seo-preview-title {
    font-size: 18px;
    color: #1a0dab;
    margin-bottom: 4px;
    line-height: 1.3;
  }

  .seo-preview-desc {
    font-size: 13px;
    color: #4d5156;
    line-height: 1.5;
  }

  /* ===== ALERT ===== */
  .alert {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    animation: slideDown 0.3s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
  .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
  .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }

  /* ===== LOADING ===== */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 48px; height: 48px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== STATUS BADGE ===== */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }

  .status-badge.active { background: #d1fae5; color: #065f46; }
  .status-badge.inactive { background: #f3f4f6; color: #6b7280; }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ===== SAVE BAR ===== */
  .save-bar {
    position: fixed;
    bottom: 24px;
    right: 32px;
    background: var(--primary-dark);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 200;
    font-size: 13px;
    font-weight: 500;
    transform: translateY(100px);
    opacity: 0;
    transition: var(--transition);
  }

  .save-bar.visible {
    transform: translateY(0);
    opacity: 1;
  }

  .save-bar .btn-save {
    background: var(--primary-light);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
  }

  .save-bar .btn-save:hover { background: #40916c; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .tab-panel { padding: 20px; }
    .preview-cards { grid-template-columns: repeat(2, 1fr); }
  }

  /* ===== UPLOAD AREA ===== */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: var(--transition);
    background: var(--bg);
  }
