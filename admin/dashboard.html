<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – Fazenda da Esperança</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --primary:       #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: rgba(37,99,235,.15);
    --bg:            #0f172a;
    --surface:       #1e293b;
    --surface2:      #273549;
    --border:        #334155;
    --text:          #e2e8f0;
    --text-muted:    #94a3b8;
    --success:       #22c55e;
    --warning:       #f59e0b;
    --danger:        #ef4444;
    --sidebar-w:     220px;
    --radius:        12px;
    --shadow:        0 4px 24px rgba(0,0,0,.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    height: 100vh;
    z-index: 100;
    transition: transform .3s;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-logo .logo-badge {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-text { line-height: 1.2; }
  .logo-text strong { display: block; font-size: 13px; color: var(--text); }
  .logo-text span { font-size: 11px; color: var(--text-muted); }

  .sidebar-nav { flex: 1; padding: 16px 12px; overflow-y: auto; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--text-muted); text-transform: uppercase; padding: 0 8px 8px; }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    color: var(--text-muted); text-decoration: none;
    font-size: 13.5px; font-weight: 500;
    transition: background .2s, color .2s;
    margin-bottom: 2px; cursor: pointer;
  }
  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: var(--primary-light); color: var(--primary); }
  .nav-link .icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
  .btn-logout {
    width: 100%; display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    background: transparent; border: 1px solid var(--border);
    color: var(--danger); font-size: 13.5px; font-weight: 500;
    cursor: pointer; transition: background .2s;
  }
  .btn-logout:hover { background: rgba(239,68,68,.1); }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .hamburger {
    display: none; background: none; border: none;
    color: var(--text); font-size: 20px; cursor: pointer;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .badge-online {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--success);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--primary); display: flex; align-items: center;
    justify-content: center; font-weight: 700; font-size: 13px;
  }

  /* ── CONTENT ── */
  .content { padding: 28px; flex: 1; }

  /* ── CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 18px; margin-bottom: 28px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    transition: transform .2s;
  }
  .card:hover { transform: translateY(-2px); }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .card-label { font-size: 12px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
  .card-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center; font-size: 17px;
  }
  .card-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 6px; }
  .card-delta { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
  .delta-up { color: var(--success); }
  .delta-down { color: var(--danger); }

  /* ── GRID 2 COL ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  @media(max-width:900px){ .grid-2 { grid-template-columns: 1fr; } }

  /* ── PANELS ── */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-size: 14px; font-weight: 700; }
  .panel-body { padding: 20px; }

  /* ── CHART ── */
  .chart-wrap { position: relative; height: 240px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 10px 14px;
    font-size: 11px; font-weight: 700; letter-spacing: .06em;
    color: var(--text-muted); text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 11px 14px; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
  tbody tr:last-child td { border-bottom: none; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .status-novo    { background: rgba(37,99,235,.2);  color: #60a5fa; }
  .status-ativo   { background: rgba(34,197,94,.15); color: var(--success); }
  .status-inativo { background: rgba(239,68,68,.15); color: var(--danger); }

  /* ── LOADING / EMPTY ── */
  .skeleton { background: var(--surface2); border-radius: 6px; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
  .empty-state { text-align: center; padding: 32px; color: var(--text-muted); font-size: 13px; }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 18px;
    font-size: 13px; box-shadow: var(--shadow);
    opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none; z-index: 999;
    max-width: 320px;
  }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.error { border-left: 3px solid var(--danger); }
  #toast.success { border-left: 3px solid var(--success); }

  /* ── OVERLAY ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 99;
  }

  /* ── RESPONSIVE ── */
  @media(max-width:768px){
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .overlay.open { display: block; }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .content { padding: 16px; }
    .cards-grid { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width:480px){
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- ══════════ SIDEBAR ══════════ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-badge">
        <div class="logo-icon">🌿</div>
        <div class="logo-text">
          <strong>Fazenda da</strong>
          <span>Esperança EAD</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-label">Menu</div>
      <a class="nav-link active" onclick="setActive(this)">
        <span class="icon">📊</span> Dashboard
      </a>
      <a class="nav-link" onclick="setActive(this)">
        <span class="icon">📚</span> Conteúdo
      </a>
      <a class="nav-link" onclick="setActive(this)">
        <span class="icon">👥</span> Usuários
      </a>
      <a class="nav-link" onclick="setActive(this)">
        <span class="icon">📋</span> Formulários
      </a>
      <div class="nav-label" style="margin-top:16px">Sistema</div>
      <a class="nav-link" onclick="setActive(this)">
        <span class="icon">⚙️</span> Configurações
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="handleLogout()">
        <span>🚪</span> Sair
      </button>
    </div>
  </aside>

  <!-- ══════════ MAIN ══════════ -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">☰</button>
        <h1>Dashboard</h1>
      </div>
      <div class="topbar-right">
        <div class="badge-online"><div class="dot"></div><span id="conn-status">Conectando…</span></div>
        <div class="avatar" id="user-avatar">AD</div>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="content">

      <!-- CARDS -->
      <div class="cards-grid" id="cards-grid">
        <div class="card skeleton" style="height:110px"></div>
        <div class="card skeleton" style="height:110px"></div>
        <div class="card skeleton" style="height:110px"></div>
        <div class="card skeleton" style="height:110px"></div>
      </div>

      <!-- CHART + MINI STATS -->
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">📈 Inscrições por Mês</span>
            <span style="font-size:11px;color:var(--text-muted)" id="chart-year">2024</span>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="enrollChart"></canvas>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span class="panel-title">🎓 Cursos Populares</span>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="coursesChart"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- TABLE LEADS -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">🧾 Últimos 5 Leads</span>
          <span style="font-size:11px;color:var(--text-muted);cursor:pointer" onclick="loadLeads()">↻ Atualizar</span>
        </div>
        <div class="panel-body" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Nome</th>
                  <th>E-mail</th>
                  <th>Curso</th>
                  <th>Data</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="leads-tbody">
                <tr><td colspan="6" class="empty-state">Carregando dados…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </main>
  </div><!-- /main -->
</div><!-- /app -->

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   CONFIGURAÇÃO SUPABASE
   ═══════════════════════════════════════════════ */
const SUPABASE_URL = 'https://SEU_PROJETO.supabase.co';
const SUPABASE_KEY = 'SUA_ANON_KEY_AQUI';

/* ═══════════════════════════════════════════════
   INICIALIZAÇÃO
   ═══════════════════════════════════════════════ */
let supabase = null;
let enrollChart = null;
let coursesChart = null;

(async () => {
  try {
    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await checkSession();
    await Promise.all([loadMetrics(), loadLeads(), initCharts()]);
  } catch (err) {
    console.warn('Supabase não configurado, usando dados demo.', err);
    document.getElementById('conn-status').textContent = 'Demo Mode';
    loadDemo();
  }
})();

/* ═══════════════════════════════════════════════
   SESSÃO
   ═══════════════════════════════════════════════ */
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    showToast('Sessão expirada. Redirecionando…', 'error');
    setTimeout(() => window.location.href = 'login.html', 2000);
    throw new Error('no-session');
  }
  const email = session.user.email || '';
  const initials = email.substring(0, 2).toUpperCase();
  document.getElementById('user-avatar').textContent = initials;
  document.getElementById('conn-status').textContent = 'Online';
}

/* ═══════════════════════════════════════════════
   MÉTRICAS
   ═══════════════════════════════════════════════ */
async function loadMetrics() {
  try {
    const [leads, users, courses, enrollments] = await Promise.all([
      supabase.from('leads').select('id', { count: 'exact', head: true }),
      supabase.from('profiles').select('id', { count: 'exact', head: true }),
      supabase.from('courses').select('id', { count: 'exact', head: true }),
      supabase.from('enrollments').select('id', { count: 'exact', head: true }),
    ]);
    renderCards([
      { label: 'Total de Leads',    value: leads.count       ?? 0, icon: '📥', color: '#2563eb', delta: '+12%', up: true  },
      { label: 'Usuários Ativos',   value: users.count       ?? 0, icon: '👥', color: '#7c3aed', delta: '+8%',  up: true  },
      { label: 'Cursos Publicados', value: courses.count     ?? 0, icon: '📚', color: '#0891b2', delta: '+2',   up: true  },
      { label: 'Matrículas',        value: enrollments.count ?? 0, icon: '🎓', color: '#059669', delta: '+5%',  up: true  },
    ]);
  } catch {
    renderCards(demoMetrics());
  }
}

function renderCards(data) {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = data.map(d => `
    <div class="card">
      <div class="card-header">
        <span class="card-label">${d.label}</span>
        <div class="card-icon" style="background:${d.color}22">
          <span style="font-size:18px">${d.icon}</span>
        </div>
      </div>
      <div class="card-value" style="color:${d.color}">${Number(d.value).toLocaleString('pt-BR')}</div>
      <div class="card-delta">
        <span class="${d.up ? 'delta-up' : 'delta-down'}">${d.up ? '▲' : '▼'} ${d.delta}</span>
        vs. mês anterior
      </div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════════════
   LEADS TABLE
   ═══════════════════════════════════════════════ */
async function loadLeads() {
  const tbody = document.getElementById('leads-tbody');
  tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Carregando…</td></tr>';
  try {
    const { data, error } = await supabase
      .from('leads')
      .select('id, nome, email, curso, created_at, status')
      .order('created_at', { ascending: false })
      .limit(5);
    if (error) throw error;
    renderLeads(data);
  } catch {
    renderLeads(demoLeads());
  }
}

function renderLeads(rows) {
  const tbody = document.getElementById('leads-tbody');
  if (!rows || rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum lead encontrado.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map((r, i) => {
    const statusClass = { novo: 'status-novo', ativo: 'status-ativo', inativo: 'status-inativo' }[r.status] || 'status-novo';
    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('pt-BR') : '—';
    return `
      <tr>
        <td style="color:var(--text-muted)">${String(i + 1).padStart(2,'0')}</td>
        <td><strong>${escHtml(r.nome || r.name || '—')}</strong></td>
        <td style="color:var(--text-muted)">${escHtml(r.email || '—')}</td>
        <td>${escHtml(r.curso || r.course || '—')}</td>
        <td style="color:var(--text-muted)">${date}</td>
        <td><span class="status-badge ${statusClass}">${r.status || 'novo'}</span></td>
      </tr>`;
  }).join('');
}

/* ═══════════════════════════════════════════════
   CHARTS
   ═══════════════════════════════════════════════ */
async function initCharts() {
  let monthlyData = Array(12).fill(0);
  let courseLabels = ['Oração', 'Bíblia', 'Família', 'Liderança', 'Missões'];
  let courseData   = [42, 35, 28, 19, 15];

  try {
    const year = new Date().getFullYear();
    document.getElementById('chart-year').textContent = year;

    const { data } = await supabase
      .from('enrollments')
      .select('created_at')
      .gte('created_at', `${year}-01-01`)
      .lte('created_at', `${year}-12-31`);

    if (data && data.length) {
      data.forEach(r => {
        const m = new Date(r.created_at).getMonth();
        monthlyData[m]++;
      });
    }
  } catch { /* usa demo */ }

  buildEnrollChart(monthlyData);
  buildCoursesChart(courseLabels, courseData);
}

function buildEnrollChart(data) {
  const ctx = document.getElementById('enrollChart').getContext('2d');
  const labels = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  if (enrollChart) enrollChart.destroy();
  enrollChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Inscrições',
        data,
        borderColor: '#2563eb',
        backgroundColor: 'rgba(37,99,235,.12)',
        borderWidth: 2.5,
        pointBackgroundColor: '#2563eb',
        pointRadius: 4,
        fill: true,
        tension: .4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 11 } } },
        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8', font: { size: 11 }, stepSize: 1 }, beginAtZero: true }
      }
    }
  });
}

function buildCoursesChart(labels, data) {
  const ctx = document.getElementById('coursesChart').getContext('2d');
  const colors = ['#2563eb','#7c3aed','#0891b2','#059669','#f59e0b'];
  if (coursesChart) coursesChart.destroy();
  coursesChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors.map(c => c + 'cc'),
        borderColor: colors,
        borderWidth: 2,
        hoverOffset: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { color: '#94a3b8', font: { size: 11 }, boxWidth: 12, padding: 14 }
        }
      }
    }
  });
}

/* ═══════════════════════════════════════════════
   DEMO DATA (fallback)
   ═══════════════════════════════════════════════ */
function demoMetrics() {
  return [
    { label: 'Total de Leads',    value: 1284, icon: '📥', color: '#2563eb', delta: '+12%', up: true  },
    { label: 'Usuários Ativos',   value:  847, icon: '👥', color: '#7c3aed', delta: '+8%',  up: true  },
    { label: 'Cursos Publicados', value:   18, icon: '📚', color: '#0891b2', delta: '+2',   up: true  },
    { label: 'Matrículas',        value: 3621, icon: '🎓', color: '#059669', delta: '+5%',  up: true  },
  ];
}

function demoLeads() {
  const statuses = ['novo','ativo','ativo','inativo','novo'];
  const cursos   = ['Oração Contemplativa','Bíblia em 1 Ano','Família Cristã','Liderança Servidora','Missões'];
  const nomes    = ['Ana Beatriz Silva','Carlos Eduardo Mota','Fernanda Lima','João Pedro Alves','Maria Aparecida Souza'];
  const emails   = ['ana@email.com','carlos@email.com','fernanda@email.com','joao@email.com','maria@email.com'];
  return nomes.map((nome, i) => ({
    nome, email: emails[i], curso: cursos[i], status: statuses[i],
    created_at: new Date(Date.now() - i * 86400000 * 2).toISOString()
  }));
}

function loadDemo() {
  renderCards(demoMetrics());
  renderLeads(demoLeads());
  const demo = [14,22,18,31,27,40,35,48,52,44,38,60];
  buildEnrollChart(demo);
  buildCoursesChart(['Oração','Bíblia','Família','Liderança','Missões'],[42,35,28,19,15]);
}

/* ═══════════════════════════════════════════════
   LOGOUT
   ═══════════════════════════════════════════════ */
async function handleLogout() {
  try {
    if (supabase) await supabase.auth.signOut();
    showToast('Sessão encerrada com sucesso.', 'success');
    setTimeout(() => window.location.href = 'login.html', 1500);
  } catch {
    showToast('Erro ao sair. Tente novamente.', 'error');
  }
}

/* ═══════════════════════════════════════════════
   UI HELPERS
   ═══════════════════════════════════════════════ */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function setActive(el) {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  el.classList.add('active');
  closeSidebar();
}

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3500);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
