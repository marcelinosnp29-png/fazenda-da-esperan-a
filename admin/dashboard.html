<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – Fazenda da Esperança</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --primary-light: rgba(37,99,235,0.15);
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #263248;
    --border: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;
    --sidebar-w: 220px;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  /* ── SIDEBAR ── */
  .sidebar {
    position: fixed; top: 0; left: 0;
    width: var(--sidebar-w); height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    z-index: 100; transition: transform .3s;
  }
  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo .logo-icon {
    width: 38px; height: 38px; border-radius: 10px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .sidebar-logo .logo-text { font-size: 13px; font-weight: 700; line-height: 1.3; color: var(--text); }
  .sidebar-logo .logo-sub { font-size: 10px; color: var(--text-muted); font-weight: 400; }

  .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;
    letter-spacing: .08em; padding: 8px 8px 4px; }
  .nav-link {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    color: var(--text-muted); text-decoration: none;
    font-size: 14px; font-weight: 500;
    transition: background .2s, color .2s; cursor: pointer; border: none; background: none; width: 100%;
  }
  .nav-link:hover { background: var(--surface2); color: var(--text); }
  .nav-link.active { background: var(--primary-light); color: var(--primary); }
  .nav-link .nav-icon { font-size: 17px; width: 20px; text-align: center; }
  .nav-badge {
    margin-left: auto; background: var(--primary);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
  }

  .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
  .btn-logout {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: rgba(239,68,68,.12); color: var(--danger);
    border: none; cursor: pointer; font-size: 14px; font-weight: 600;
    transition: background .2s;
  }
  .btn-logout:hover { background: rgba(239,68,68,.22); }

  /* ── MAIN ── */
  .main {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .hamburger {
    display: none; background: none; border: none; color: var(--text);
    font-size: 22px; cursor: pointer; padding: 4px;
  }
  .page-title { font-size: 18px; font-weight: 700; }
  .topbar-right { display: flex; align-items: center; gap: 14px; }
  .topbar-date { font-size: 12px; color: var(--text-muted); }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--primary); display: flex; align-items: center;
    justify-content: center; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); display: inline-block;
    box-shadow: 0 0 0 2px rgba(34,197,94,.3);
  }

  .content { padding: 28px; flex: 1; }

  /* ── METRICS ── */
  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px; margin-bottom: 28px;
  }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 20px;
    display: flex; flex-direction: column; gap: 12px;
    transition: transform .2s, box-shadow .2s;
  }
  .metric-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
  .metric-header { display: flex; align-items: center; justify-content: space-between; }
  .metric-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
  .metric-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .metric-icon.blue { background: var(--primary-light); }
  .metric-icon.green { background: rgba(34,197,94,.15); }
  .metric-icon.yellow { background: rgba(245,158,11,.15); }
  .metric-icon.red { background: rgba(239,68,68,.15); }
  .metric-value { font-size: 30px; font-weight: 800; line-height: 1; }
  .metric-footer { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .metric-change { font-weight: 600; }
  .metric-change.up { color: var(--success); }
  .metric-change.down { color: var(--danger); }
  .metric-period { color: var(--text-muted); }

  /* ── CHARTS + TABLE ROW ── */
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 28px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 22px 20px;
  }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .card-title { font-size: 15px; font-weight: 700; }
  .card-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; background: var(--primary-light); color: var(--primary);
  }
  .chart-wrap { position: relative; height: 220px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; white-space: nowrap; }
  td { padding: 12px 14px; border-bottom: 1px solid rgba(51,65,85,.5); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface2); }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600;
  }
  .badge-green { background: rgba(34,197,94,.15); color: var(--success); }
  .badge-yellow { background: rgba(245,158,11,.15); color: var(--warning); }
  .badge-blue { background: var(--primary-light); color: var(--primary); }
  .badge-red { background: rgba(239,68,68,.15); color: var(--danger); }
  .user-cell { display: flex; align-items: center; gap: 10px; }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--primary); display: flex; align-items: center;
    justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .user-name { font-weight: 600; }
  .user-email { font-size: 11px; color: var(--text-muted); }

  /* ── FULL TABLE SECTION ── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .btn-primary {
    background: var(--primary); color: #fff; border: none;
    padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background .2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-outline {
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); padding: 8px 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
  }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

  /* ── LOADING ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .skeleton-text { height: 14px; margin-bottom: 8px; }
  .skeleton-val { height: 32px; width: 80px; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    padding: 14px 18px; border-radius: 10px;
    font-size: 13px; box-shadow: var(--shadow);
    animation: slideIn .3s ease;
    max-width: 300px;
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.success { border-left-color: var(--success); }
  @keyframes slideIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }

  /* ── OVERLAY ── */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 90; }
  .overlay.show { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) {
    .metrics-grid { grid-template-columns: repeat(2, 1fr); }
    .row-2 { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .metrics-grid { grid-template-columns: 1fr 1fr; }
    .content { padding: 16px; }
    .topbar { padding: 0 16px; }
  }
  @media (max-width: 480px) {
    .metrics-grid { grid-template-columns: 1fr; }
    .topbar-date { display: none; }
  }
</style>
</head>
<body>

<!-- Overlay mobile -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ── SIDEBAR ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🌱</div>
    <div>
      <div class="logo-text">Fazenda da<br>Esperança</div>
      <div class="logo-sub">Painel Admin</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <div class="nav-label">Menu</div>
    <a class="nav-link active" onclick="setActive(this)">
      <span class="nav-icon">📊</span> Dashboard
    </a>
    <a class="nav-link" onclick="setActive(this)">
      <span class="nav-icon">🎓</span> Conteúdo
      <span class="nav-badge">12</span>
    </a>
    <a class="nav-link" onclick="setActive(this)">
      <span class="nav-icon">👥</span> Usuários
    </a>
    <a class="nav-link" onclick="setActive(this)">
      <span class="nav-icon">📋</span> Formulários
      <span class="nav-badge">3</span>
    </a>
    <div class="nav-label" style="margin-top:8px">Sistema</div>
    <a class="nav-link" onclick="setActive(this)">
      <span class="nav-icon">⚙️</span> Configurações
    </a>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">
      <span>🚪</span> Sair
    </button>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <div class="page-title">Dashboard</div>
    </div>
    <div class="topbar-right">
      <span class="status-dot"></span>
      <span class="topbar-date" id="topbarDate"></span>
      <div class="avatar" id="avatarEl" title="Perfil">A</div>
    </div>
  </header>

  <!-- Content -->
  <div class="content">

    <!-- Metrics -->
    <div class="metrics-grid" id="metricsGrid">
      <!-- Skeleton -->
      <div class="metric-card" id="mc0">
        <div class="metric-header">
          <div class="skeleton skeleton-text" style="width:100px"></div>
          <div class="skeleton" style="width:36px;height:36px;border-radius:8px"></div>
        </div>
        <div class="skeleton skeleton-val"></div>
        <div class="skeleton skeleton-text" style="width:120px"></div>
      </div>
      <div class="metric-card" id="mc1">
        <div class="metric-header">
          <div class="skeleton skeleton-text" style="width:100px"></div>
          <div class="skeleton" style="width:36px;height:36px;border-radius:8px"></div>
        </div>
        <div class="skeleton skeleton-val"></div>
        <div class="skeleton skeleton-text" style="width:120px"></div>
      </div>
      <div class="metric-card" id="mc2">
        <div class="metric-header">
          <div class="skeleton skeleton-text" style="width:100px"></div>
          <div class="skeleton" style="width:36px;height:36px;border-radius:8px"></div>
        </div>
        <div class="skeleton skeleton-val"></div>
        <div class="skeleton skeleton-text" style="width:120px"></div>
      </div>
      <div class="metric-card" id="mc3">
        <div class="metric-header">
          <div class="skeleton skeleton-text" style="width:100px"></div>
          <div class="skeleton" style="width:36px;height:36px;border-radius:8px"></div>
        </div>
        <div class="skeleton skeleton-val"></div>
        <div class="skeleton skeleton-text" style="width:120px"></div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="row-2">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Matrículas por Mês</span>
          <span class="card-badge">2024</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chartMatriculas"></canvas>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">Distribuição de Cursos</span>
          <span class="card-badge">Ativos</span>
        </div>
        <div class="chart-wrap">
          <canvas id="chartCursos"></canvas>
        </div>
      </div>
    </div>

    <!-- Leads table -->
    <div class="card">
      <div class="section-header">
        <div>
          <div class="section-title">Últimos Leads</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px">5 registros mais recentes</div>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn-outline" onclick="loadLeads()">🔄 Atualizar</button>
          <button class="btn-primary">➕ Novo Lead</button>

      <div class="table-wrap">

              <th>Usuário</th>
              <th>Curso</th>

              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="leadsBody">
            <tr><td colspan="6" style="text-align:center;padding:30px;color:var(--text-muted)">
              <div class="skeleton skeleton-text" style="width:200px;margin:0 auto"></div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ══════════════════════════════════════════
   CONFIGURAÇÃO SUPABASE
══════════════════════════════════════════ */
const SUPABASE_URL = 'https://akcxbsfhemrbqxhguavn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_muXEDXQS0ClofJ_MFHM5RA_GyZhuC3h';

/* ══════════════════════════════════════════
   INICIALIZAÇÃO
══════════════════════════════════════════ */
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let chartBar = null;
let chartDoughnut = null;

/* ── Data no topbar ── */
function setTopbarDate() {
  const el = document.getElementById('topbarDate');
  const now = new Date();
  el.textContent = now.toLocaleDateString('pt-BR', { weekday:'short', day:'2-digit', month:'short', year:'numeric' });
}
setTopbarDate();

/* ══════════════════════════════════════════
   SESSÃO
══════════════════════════════════════════ */
async function checkSession() {
  try {
    const { data: { session }, error } = await sb.auth.getSession();
    if (error) throw error;
    if (!session) {
      // Sem sessão real → modo demo
      showToast('Modo demonstração ativo', 'info');
      initDemo();
      return;
    }
    const user = session.user;
    const initials = (user.email || 'A')[0].toUpperCase();
    document.getElementById('avatarEl').textContent = initials;
    showToast(`Bem-vindo! ${user.email}`, 'success');
    await loadAll();
  } catch (e) {
    console.warn('Supabase não configurado – modo demo:', e.message);
    initDemo();
  }
}

/* ══════════════════════════════════════════
   MODO DEMO (sem Supabase configurado)
══════════════════════════════════════════ */
function initDemo() {
  const metrics = [
    { label:'Total de Alunos', value:'1.847', icon:'👥', cls:'blue', change:'+12%', up:true },
    { label:'Cursos Ativos', value:'24', icon:'🎓', cls:'green', change:'+3', up:true },
    { label:'Receita Mensal', value:'R$ 48.200', icon:'💰', cls:'yellow', change:'+8,5%', up:true },
    { label:'Taxa de Evasão', value:'4,2%', icon:'⚠️', cls:'red', change:'-1,3%', up:false },
  ];
  renderMetrics(metrics);

  const leads = [
    { name:'Ana Carolina Silva', email:'ana@email.com', curso:'Agropecuária Básica', status:'Convertido', origem:'Instagram', data:'12/06/2024' },
    { name:'João Pedro Alves', email:'joao@email.com', curso:'Gestão Rural', status:'Em contato', origem:'Google Ads', data:'11/06/2024' },
    { name:'Maria Fernanda Costa', email:'mf@email.com', curso:'Agricultura Orgânica', status:'Novo', origem:'Indicação', data:'10/06/2024' },
    { name:'Carlos Eduardo Lima', email:'carlos@email.com', curso:'Pecuária Avançada', status:'Convertido', origem:'Facebook', data:'09/06/2024' },
    { name:'Beatriz Souza', email:'bea@email.com', curso:'Agropecuária Básica', status:'Perdido', origem:'Site', data:'08/06/2024' },
  ];
  renderLeads(leads);
  renderCharts();
}

/* ══════════════════════════════════════════
   LOAD ALL (Supabase real)
══════════════════════════════════════════ */
async function loadAll() {
  await Promise.all([loadMetrics(), loadLeads(), renderCharts()]);
}

/* ── Métricas ── */
async function loadMetrics() {
  try {
    const [{ count: totalAlunos }, { count: cursosAtivos }, { data: receita }, { data: evasao }] = await Promise.all([
      sb.from('users').select('*', { count:'exact', head:true }),
      sb.from('courses').select('*', { count:'exact', head:true }).eq('active', true),
      sb.from('payments').select('amount').gte('created_at', new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString()),
      sb.from('enrollments').select('status').eq('status', 'cancelled'),
    ]);
    const totalReceita = (receita || []).reduce((s, r) => s + (r.amount || 0), 0);
    const metrics = [
      { label:'Total de Alunos', value: (totalAlunos||0).toLocaleString('pt-BR'), icon:'👥', cls:'blue', change:'+12%', up:true },
      { label:'Cursos Ativos', value: String(cursosAtivos||0), icon:'🎓', cls:'green', change:'+3', up:true },
      { label:'Receita Mensal', value:`R$ ${totalReceita.toLocaleString('pt-BR')}`, icon:'💰', cls:'yellow', change:'+8,5%', up:true },
      { label:'Taxa de Evasão', value:`${(evasao||[]).length}`, icon:'⚠️', cls:'red', change:'-1,3%', up:false },
    ];
    renderMetrics(metrics);
  } catch (e) {
    console.warn('loadMetrics fallback:', e.message);
    initDemo();
  }
}

/* ── Leads ── */
async function loadLeads() {
  try {
    const { data, error } = await sb
      .from('leads')
      .select('name, email, course, status, source, created_at')
      .order('created_at', { ascending: false })
      .limit(5);
    if (error) throw error;
    const mapped = (data || []).map(r => ({
      name: r.name || '—',
      email: r.email || '—',
      curso: r.course || '—',
      status: r.status || 'Novo',
      origem: r.source || '—',
      data: new Date(r.created_at).toLocaleDateString('pt-BR'),
    }));
    renderLeads(mapped.length ? mapped : getDemoLeads());
  } catch (e) {
    console.warn('loadLeads fallback:', e.message);
    renderLeads(getDemoLeads());
  }
}

function getDemoLeads() {
  return [
    { name:'Ana Carolina Silva', email:'ana@email.com', curso:'Agropecuária Básica', status:'Convertido', origem:'Instagram', data:'12/06/2024' },
    { name:'João Pedro Alves', email:'joao@email.com', curso:'Gestão Rural', status:'Em contato', origem:'Google Ads', data:'11/06/2024' },
    { name:'Maria Fernanda Costa', email:'mf@email.com', curso:'Agricultura Orgânica', status:'Novo', origem:'Indicação', data:'10/06/2024' },
    { name:'Carlos Eduardo Lima', email:'carlos@email.com', curso:'Pecuária Avançada', status:'Convertido', origem:'Facebook', data:'09/06/2024' },
    { name:'Beatriz Souza', email:'bea@email.com', curso:'Agropecuária Básica', status:'Perdido', origem:'Site', data:'08/06/2024' },
  ];
}

function renderMetrics(metrics) {
  const grid = document.getElementById('metricsGrid');
  grid.innerHTML = metrics.map(m => `
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-label">${m.label}</span>
        <div class="metric-icon ${m.cls}">${m.icon}</div>
      </div>
      <div class="metric-value">${m.value}</div>
      <div class="metric-footer">
        <span class="metric-change ${m.up?'up':'down'}">${m.up?'▲':'▼'} ${m.change}</span>
        <span class="metric-period">vs mês anterior</span>
      </div>
    </div>
  `).join('');
}

function statusBadge(s) {
  const map = {
    'Convertido':'badge-green', 'Em contato':'badge-yellow',
    'Novo':'badge-blue', 'Perdido':'badge-red'
  };
  return `<span class="badge ${map[s]||'badge-blue'}">● ${s}</span>`;
}
