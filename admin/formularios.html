<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulários / Leads — Fazenda da Esperança Admin</title>
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --sidebar-w: 260px;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --font: 'Segoe UI', Arial, sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: #f4f7f5; color: #1a2e22; min-height: 100vh; display: flex; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--green-dark);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0;
    z-index: 200;
    transition: transform .3s;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 12px;
    padding: 28px 20px 22px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .sidebar-logo img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; }
  .sidebar-logo-text { color: #fff; }
  .sidebar-logo-text strong { display: block; font-size: .98rem; letter-spacing: .5px; }
  .sidebar-logo-text span { font-size: .72rem; color: var(--gold-light); opacity: .85; }
  .sidebar-nav { flex: 1; padding: 18px 0; }
  .nav-section { padding: 8px 20px 4px; font-size: .68rem; text-transform: uppercase; letter-spacing: 1.2px; color: rgba(255,255,255,.35); }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; color: rgba(255,255,255,.72);
    text-decoration: none; font-size: .88rem;
    border-left: 3px solid transparent;
    transition: all .2s; cursor: pointer;
  }
  .nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
  .nav-item.active { background: rgba(201,168,76,.13); color: var(--gold-light); border-left-color: var(--gold); }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-footer { padding: 18px 20px; border-top: 1px solid rgba(255,255,255,.08); }
  .sidebar-footer .nav-item { padding: 8px 0; }

  /* ── MAIN ── */
  .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

  /* ── TOPBAR ── */
  .topbar {
    background: #fff; border-bottom: 1px solid #e0ebe5;
    padding: 0 30px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .hamburger { display: none; background: none; border: none; cursor: pointer; padding: 6px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--green-dark); margin: 4px 0; border-radius: 2px; }
  .topbar-title { font-size: 1.12rem; font-weight: 700; color: var(--green-dark); }
  .topbar-right { display: flex; align-items: center; gap: 16px; }
  .topbar-badge {
    position: relative; background: none; border: none; cursor: pointer; padding: 6px;
  }
  .topbar-badge svg { width: 22px; height: 22px; color: #555; }
  .badge-dot {
    position: absolute; top: 4px; right: 4px;
    width: 9px; height: 9px; background: #e74c3c;
    border-radius: 50%; border: 2px solid #fff;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--green-mid); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: .85rem; cursor: pointer;
  }

  /* ── CONTENT ── */
  .content { padding: 28px 30px; flex: 1; }
  .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .page-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--green-dark); }
  .page-header p { font-size: .88rem; color: #5a7a65; margin-top: 2px; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px; border-radius: var(--radius);
    font-size: .88rem; font-weight: 600; cursor: pointer;
    border: none; transition: all .2s; text-decoration: none;
  }
  .btn-primary { background: var(--green-mid); color: #fff; }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-gold { background: var(--gold); color: #fff; }
  .btn-gold:hover { background: #b8953e; }
  .btn-outline { background: #fff; color: var(--green-mid); border: 1.5px solid var(--green-mid); }
  .btn-outline:hover { background: var(--green-pale); }
  .btn-sm { padding: 6px 14px; font-size: .8rem; }
  .btn svg { width: 16px; height: 16px; }

  /* ── SUMMARY CARDS ── */
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 18px; margin-bottom: 26px; }
  .card {
    background: #fff; border-radius: var(--radius);
    padding: 20px 22px; box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 16px;
    border-left: 4px solid transparent;
    transition: transform .2s;
  }
  .card:hover { transform: translateY(-2px); }
  .card.total { border-left-color: var(--green-mid); }
  .card.novos { border-left-color: var(--gold); }
  .card.respondidos { border-left-color: #27ae60; }
  .card.pendentes { border-left-color: #e67e22; }
  .card-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card.total .card-icon { background: #e8f5e9; color: var(--green-mid); }
  .card.novos .card-icon { background: #fff8e1; color: var(--gold); }
  .card.respondidos .card-icon { background: #e8f5e9; color: #27ae60; }
  .card.pendentes .card-icon { background: #fff3e0; color: #e67e22; }
  .card-icon svg { width: 24px; height: 24px; }
  .card-info { flex: 1; }
  .card-value { font-size: 1.8rem; font-weight: 800; color: var(--green-dark); line-height: 1; }
  .card-label { font-size: .78rem; color: #7a9a85; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .card-delta { font-size: .75rem; margin-top: 6px; display: flex; align-items: center; gap: 4px; }
  .delta-up { color: #27ae60; }
  .delta-down { color: #e74c3c; }

  /* ── FILTERS ── */
  .filters-bar {
    background: #fff; border-radius: var(--radius);
    padding: 16px 20px; box-shadow: var(--shadow);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: .72rem; font-weight: 600; color: #5a7a65; text-transform: uppercase; letter-spacing: .5px; }
  .filter-group select,
  .filter-group input {
    padding: 8px 12px; border: 1.5px solid #d0e4d8; border-radius: 8px;
    font-size: .85rem; color: var(--green-dark); background: #f9fdf9;
    outline: none; transition: border .2s; min-width: 140px;
  }
  .filter-group select:focus,
  .filter-group input:focus { border-color: var(--green-mid); }
  .search-wrap { flex: 1; min-width: 200px; }
  .search-wrap input { width: 100%; }
  .filters-actions { display: flex; gap: 10px; margin-left: auto; align-items: flex-end; }

  /* ── TABLE ── */
  .table-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .table-header {
    padding: 16px 22px; border-bottom: 1px solid #e8f0eb;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .table-header h2 { font-size: 1rem; font-weight: 700; color: var(--green-dark); }
  .table-header-right { display: flex; gap: 10px; align-items: center; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    padding: 12px 16px; text-align: left;
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .6px; color: #5a7a65;
    background: #f4f9f6; border-bottom: 1px solid #e0ebe5;
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { background: #e8f5e9; }
  thead th .sort-icon { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--green-mid); }
  tbody tr { border-bottom: 1px solid #f0f5f2; transition: background .15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f7fdf9; }
  tbody td { padding: 13px 16px; font-size: .87rem; color: #2a3d30; vertical-align: middle; }
  .td-name { font-weight: 600; }
  .td-email { color: #5a7a65; font-size: .82rem; }
  .td-phone { color: #5a7a65; font-size: .82rem; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 10px; border-radius: 20px; font-size: .75rem; font-weight: 600;
  }
  .status-novo { background: #fff8e1; color: #c9a84c; }
  .status-respondido { background: #e8f5e9; color: #27ae60; }
  .status-pendente { background: #fff3e0; color: #e67e22; }
  .status-arquivado { background: #f5f5f5; color: #888; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .td-actions { display: flex; gap: 6px; }
  .action-btn {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
  }
  .action-btn svg { width: 15px; height: 15px; }
  .action-view { background: #e8f5e9; color: var(--green-mid); }
  .action-view:hover { background: var(--green-mid); color: #fff; }
  .action-reply { background: #e3f2fd; color: #1976d2; }
  .action-reply:hover { background: #1976d2; color: #fff; }
  .action-delete { background: #fdecea; color: #e74c3c; }
  .action-delete:hover { background: #e74c3c; color: #fff; }
  .checkbox-col { width: 40px; }
  input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--green-mid); cursor: pointer; }
  .table-footer {
    padding: 14px 22px; border-top: 1px solid #e8f0eb;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
  }
  .table-info { font-size: .82rem; color: #7a9a85; }
  .pagination { display: flex; gap: 6px; }
  .page-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 1.5px solid #d0e4d8;
    background: #fff; color: var(--green-dark); font-size: .85rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .page-btn:hover, .page-btn.active { background: var(--green-mid); color: #fff; border-color: var(--green-mid); }
  .page-btn:disabled { opacity: .4; cursor: not-allowed; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 500; display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none; transition: opacity .25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: #fff; border-radius: 14px; width: 100%; max-width: 620px;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    transform: translateY(20px); transition: transform .25s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-header {
    padding: 22px 26px 18px; border-bottom: 1px solid #e8f0eb;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: #fff; z-index: 1;
  }
  .modal-header h2 { font-size: 1.1rem; font-weight: 700; color: var(--green-dark); }
  .modal-close {
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: #f0f5f2; color: #5a7a65; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    transition: all .2s;
  }
  .modal-close:hover { background: #fdecea; color: #e74c3c; }
  .modal-body { padding: 24px 26px; }
  .modal-section { margin-bottom: 22px; }
  .modal-section h3 {
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: #7a9a85; margin-bottom: 12px;
    padding-bottom: 6px; border-bottom: 1px solid #f0f5f2;
  }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .info-item label { font-size: .72rem; color: #7a9a85; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 3px; }
  .info-item span { font-size: .9rem; color: var(--green-dark); font-weight: 500; }
  .info-item.full { grid-column: 1 / -1; }
  .message-box {
    background: #f7fdf9; border: 1px solid #d8f0e0; border-radius: 8px;
    padding: 14px 16px; font-size: .88rem; color: #2a3d30; line-height: 1.6;
  }
  .reply-area { width: 100%; padding: 12px 14px; border: 1.5px solid #d0e4d8; border-radius: 8px; font-size: .87rem; font-family: var(--font); resize: vertical; min-height: 100px; outline: none; transition: border .2s; }
  .reply-area:focus { border-color: var(--green-mid); }
  .modal-footer { padding: 18px 26px; border-top: 1px solid #e8f0eb; display: flex; gap: 10px; justify-content: flex-end; }
  .status-select { padding: 8px 12px; border: 1.5px solid #d0e4d8; border-radius: 8px; font-size: .85rem; color: var(--green-dark); outline: none; }

  /* ── TOAST ── */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
  .toast {
    background: var(--green-dark); color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: .87rem; box-shadow: 0 4px 20px rgba(0,0,0,.2);
    display: flex; align-items: center; gap: 10px;
    animation: slideIn .3s ease; min-width: 240px;
  }
  .toast.success { border-left: 4px solid #27ae60; }
  .toast.error { border-left: 4px solid #e74c3c; }
  .toast.info { border-left: 4px solid var(--gold); }
  @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ── LOADING ── */
  .loading-row td { text-align: center; padding: 40px; color: #7a9a85; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e0ebe5; border-top-color: var(--green-mid); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 50px 20px; color: #7a9a85; }
  .empty-state svg { width: 56px; height: 56px; opacity: .3; margin-bottom: 12px; }
  .empty-state p { font-size: .9rem; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .main { margin-left: 0; }
    .hamburger { display: block; }
    .content { padding: 20px 16px; }
    .topbar { padding: 0 16px; }
    .info-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr 1fr; }
    .filters-bar { flex-direction: column; align-items: stretch; }
    .filter-group select, .filter-group input { min-width: unset; }
    .filters-actions { margin-left: 0; }
    .page-header { flex-direction: column; }
  }
</style>
</head>

<!-- ═══════════════ SIDEBAR ═══════════════ -->

  <div class="sidebar-logo">

  <div class="sidebar-footer">

<!-- ═══════════════ MAIN ═══════════════ -->
<div class="main">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <span class="topbar-title">Formulários / Leads</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-badge" title="Notificações">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="badge-dot"></span>
      </button>
      <div class="avatar" title="Admin">AD</div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="content">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div>
        <h1>Formulários & Leads</h1>
        <p>Gerencie todos os contatos e solicitações recebidas pelo site</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-outline" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exportar CSV
        </button>
        <button class="btn btn-primary" onclick="loadLeads()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Atualizar
        </button>
      </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="cards-grid" id="cardsGrid">
      <div class="card total">
        <div class="card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4
