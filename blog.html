<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog e Notícias | Fazenda da Esperança</title>
<meta name="description" content="Acompanhe as últimas notícias, artigos e conteúdos educativos da Fazenda da Esperança para voluntários e acolhidos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #3b82f6;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --success: #10b981;
    --warning: #f59e0b;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 16px;
    --transition: all 0.3s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--gray-800);
    background: var(--gray-50);
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
    transition: var(--transition);
  }

  .header.scrolled {
    box-shadow: var(--shadow-md);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }

  .logo-text { display: flex; flex-direction: column; }

  .logo-name {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.2;
  }

  .logo-tagline {
    font-size: 11px;
    color: var(--gray-500);
    font-weight: 400;
    line-height: 1.2;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav a {
    text-decoration: none;
    color: var(--gray-600);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    white-space: nowrap;
  }

  .nav a:hover, .nav a.active {
    color: var(--primary);
    background: rgba(37,99,235,0.08);
  }

  .nav a.active { font-weight: 600; }

  .header-cta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    box-shadow: 0 4px 12px rgba(37,99,235,0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(37,99,235,0.45);
  }

  .btn-outline {
    background: transparent;
    color: var(--primary);
    border: 2px solid var(--primary);
  }

  .btn-outline:hover {
    background: var(--primary);
    color: var(--white);
  }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    transition: var(--transition);
  }

  .hamburger:hover { background: var(--gray-100); }

  .hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--gray-700);
    border-radius: 2px;
    transition: var(--transition);
  }

  .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px;
    left: 0;
    right: 0;
    background: var(--white);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-lg);
    z-index: 999;
    padding: 16px 24px 24px;
    flex-direction: column;
    gap: 4px;
    max-height: calc(100vh - 72px);
    overflow-y: auto;
  }

  .mobile-menu.open { display: flex; }

  .mobile-menu a {
    text-decoration: none;
    color: var(--gray-700);
    font-size: 15px;
    font-weight: 500;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
  }

  .mobile-menu a:hover, .mobile-menu a.active {
    color: var(--primary);
    background: rgba(37,99,235,0.08);
  }

  .mobile-menu-divider {
    height: 1px;
    background: var(--gray-200);
    margin: 8px 0;
  }

  .mobile-cta {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 8px;
  }

  .mobile-cta .btn { justify-content: center; }

  /* ===== HERO BLOG ===== */
  .blog-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 64px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .blog-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 50%, rgba(255,255,255,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .blog-hero-content { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; }

  .blog-hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    color: var(--white);
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.3);
  }

  .blog-hero h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    color: var(--white);
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .blog-hero p {
    font-size: 16px;
    color: rgba(255,255,255,0.85);
    max-width: 480px;
    margin: 0 auto 32px;
  }

  .blog-search-box {
    display: flex;
    gap: 8px;
    max-width: 480px;
    margin: 0 auto;
    background: var(--white);
    border-radius: var(--radius);
    padding: 6px 6px 6px 16px;
    box-shadow: var(--shadow-lg);
  }

  .blog-search-box input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: var(--gray-700);
    font-family: 'Inter', sans-serif;
    background: transparent;
  }

  .blog-search-box input::placeholder { color: var(--gray-400); }

  .blog-search-box button {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .blog-search-box button:hover { transform: scale(1.02); }

  /* ===== MAIN LAYOUT ===== */
  .blog-main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 24px;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 40px;
    align-items: start;
  }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 32px;
  }

  .filter-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }

  .filter-btn {
    padding: 7px 16px;
    border-radius: 50px;
    border: 2px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    font-family: 'Inter', sans-serif;
  }

  .filter-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .filter-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }

  /* ===== POSTS GRID ===== */
  .posts-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .posts-count {
    font-size: 14px;
    color: var(--gray-500);
  }

  .posts-count span { font-weight: 700; color: var(--gray-800); }

  .sort-select {
    padding: 8px 12px;
    border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--gray-600);
    font-family: 'Inter', sans-serif;
    background: var(--white);
    cursor: pointer;
    outline: none;
    transition: var(--transition);
  }

  .sort-select:focus { border-color: var(--primary); }

  .posts-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 24px;
    margin-bottom: 40px;
  }

  /* ===== POST CARD ===== */
  .post-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-100);
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    cursor: pointer;
  }

  .post-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--gray-200);
  }

  .post-card.featured {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .post-thumb {
    position: relative;
    overflow: hidden;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
  }

  .post-card.featured .post-thumb {
    aspect-ratio: auto;
    min-height: 280px;
  }

  .post-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s ease;
  }

  .post-card:hover .post-thumb img { transform: scale(1.05); }

  .post-thumb-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: rgba(255,255,255,0.7);
    font-size: 40px;
  }

  .post-thumb-placeholder span {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .post-category-badge {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 4px 12px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    backdrop-filter: blur(8px);
  }

  .cat-formacao { background: rgba(37,99,235,0.9); color: #fff; }
  .cat-noticias { background: rgba(14,165,233,0.9); color: #fff; }
  .cat-testemunhos { background: rgba(16,185,129,0.9); color: #fff; }
  .cat-videos { background: rgba(245,158,11,0.9); color: #fff; }
  .cat-voluntarios { background: rgba(139,92,246,0.9); color: #fff; }
  .cat-espiritualidade { background: rgba(236,72,153,0.9); color: #fff; }

  .featured-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: linear-gradient(135deg, #f59e0b, #d97706);
    color: #fff;
    padding: 4px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .post-body {
    padding: 20px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .post-card.featured .post-body {
    padding: 32px;
    justify-content: center;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .post-meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--gray-400);
  }

  .post-meta-item svg { width: 12px; height: 12px; }

  .post-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gray-900);
    line-height: 1.4;
    transition: var(--transition);
  }

  .post-card.featured .post-title { font-size: 22px; }

  .post-card:hover .post-title { color: var(--primary); }

  .post-excerpt {
    font-size: 13px;
    color: var(--gray-500);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-card.featured .post-excerpt { -webkit-line-clamp: 4; font-size: 14px; }

  .post-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid var(--gray-100);
  }

  .post-author {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .author-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--white);
  }

  .author-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
  }

  .post-read-link {
    font-size: 12px;
    font-weight: 600;
    color: var(--primary);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: var(--transition);
  }

  .post-read-link:hover { gap: 8px; }

  /* ===== SKELETON LOADER ===== */
  .skeleton {
    background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-200) 50%, var(--gray-100) 75%);
    background-size: 200% 100%;
    animation: skeleton-loading 1.5s infinite;
    border-radius: 4px;
  }

  @keyframes skeleton-loading {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .skeleton-card {
    background: var(--white);
    border-radius: var(--radius-lg);
    overflow: hidden;
    border: 1px solid var(--gray-100);
  }

  .skeleton-thumb { height: 180px; }
  .skeleton-body { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .skeleton-line { height: 12px; }
  .skeleton-title { height: 18px; width: 85%; }
  .skeleton-title-2 { height: 18px; width: 65%; }
  .skeleton-text { height: 12px; }
  .skeleton-text-2 { height: 12px; width: 75%; }
  .skeleton-text-3 { height: 12px; width: 50%; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 64px 24px;
  }

  .empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
  }

  .empty-state h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--gray-700);
    margin-bottom: 8px;
  }

  .empty-state p {
    font-size: 14px;
    color: var(--gray-400);
    max-width: 320px;
    margin: 0 auto 24px;
  }

  /* ===== PAGINATION ===== */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }

  .page-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--gray-200);
    background: var(--white);
    color: var(--gray-600);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .page-btn:hover:not(:disabled) {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(37,99,235,0.05);
  }

  .page-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--white);
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }

  .page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .page-dots {
    color: var(--gray-400);
    font-size: 14px;
    padding: 0 4px;
  }

  /* ===== SIDEBAR ===== */
  .sidebar { display: flex; flex-direction: column; gap: 28px; }

  .sidebar-widget {
    background: var(--white);
    border-radius: var(--radius-lg);
    padding: 24px;
    border: 1px solid var(--gray-100);
    box-shadow: var(--shadow-sm);
  }

  .widget-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--gray-900);
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gray-100);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .widget-title-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  /* Recent Posts */
  .recent-posts { display: flex; flex-direction: column; gap: 16px; }

  .recent-post {
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: var(--transition);
    padding: 8px;
    border-radius: var(--radius-sm);
    margin: -8px;
  }

  .recent-post:hover { background: var(--gray-50); }

  .recent-thumb {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
  }

  .recent-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .recent-info { flex: 1; min-width: 0; }

  .recent-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-800);
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: var(--transition);
  }

  .recent-post:hover .recent-title { color: var(--primary); }

  .recent-date {
    font-size: 11px;
    color: var(--gray-400);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* Categories Widget */
  .categories-list { display: flex; flex-direction: column; gap: 8px; }

  .category-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    border: 1px solid transparent;
  }

  .category-item:hover {
    background: rgba(37,99,235,0.05);
    border-color: rgba(37,99,235,0.15);
  }

  .category-item.active {
    background: rgba(37,99,235,0.08);
    border-color: rgba(37,99,235,0.2);
  }

  .cat-info { display: flex; align-items: center; gap: 8px; }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .cat-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-700);
  }

  .cat-count {
    background: var(--gray-100);
    color: var(--gray-500);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 50px;
  }

  /* Tags Widget */
  .tags-cloud { display: flex; flex-wrap: wrap; gap: 8px; }

  .tag-item {
    padding: 5px 12px;
    border-radius: 50px;
    border: 1px solid var(--gray-200);
    font-size: 12px;
    font-weight: 500;
    color: var(--gray-600);
    cursor: pointer;
    transition: var(--transition);
    background: var(--white);
  }

  .tag-item:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(37,99,235,0.05);
  }

  /* Newsletter Widget */
  .newsletter-widget {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    text-align: center;
  }

  .newsletter-widget .widget-title {
    color: var(--white);
    border-bottom-color: rgba(255,255,255,0.2);
    justify-content: center;
  }

  .newsletter-widget p {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .newsletter-form { display: flex; flex-direction: column; gap: 8px; }
