<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog e Notícias - Fazenda da Esperança</title>
<meta name="description" content="Blog e Notícias da Fazenda da Esperança. Artigos, dicas e novidades sobre nossos cursos online.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #0ea5e9;
    --secondary-dark: #0284c7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 4px 6px rgba(0,0,0,0.07);
    --shadow-md: 0 10px 25px rgba(0,0,0,0.1);
    --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-lg: 20px;
    --transition: all 0.3s ease;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; color: var(--gray-800); background: var(--gray-50); line-height: 1.6; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 1000;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    box-shadow: var(--shadow-sm);
  }
  .header-inner {
    max-width: 1280px; margin: 0 auto; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    height: 70px;
  }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-icon {
    width: 44px; height: 44px; border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: white; font-weight: 800; flex-shrink: 0;
  }
  .logo-text { display: flex; flex-direction: column; }
  .logo-name { font-size: 16px; font-weight: 700; color: var(--gray-900); line-height: 1.2; }
  .logo-tagline { font-size: 11px; color: var(--gray-500); font-weight: 400; }
  nav { display: flex; align-items: center; gap: 8px; }
  nav a {
    text-decoration: none; color: var(--gray-600); font-size: 14px; font-weight: 500;
    padding: 8px 14px; border-radius: var(--radius-sm); transition: var(--transition);
  }
  nav a:hover, nav a.active { color: var(--primary); background: rgba(37,99,235,0.08); }
  .nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
    color: white !important; padding: 10px 20px !important; border-radius: 50px !important;
    font-weight: 600 !important; box-shadow: 0 4px 12px rgba(37,99,235,0.3);
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(37,99,235,0.4) !important; background: var(--primary-dark) !important; }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; border: none; background: none; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--gray-700); border-radius: 2px; transition: var(--transition); }
  .mobile-menu {
    display: none; position: fixed; top: 70px; left: 0; right: 0; bottom: 0;
    background: white; z-index: 999; padding: 24px; flex-direction: column; gap: 8px;
    overflow-y: auto;
  }
  .mobile-menu.open { display: flex; }
  .mobile-menu a {
    text-decoration: none; color: var(--gray-700); font-size: 16px; font-weight: 500;
    padding: 14px 16px; border-radius: var(--radius-sm); transition: var(--transition);
    border-bottom: 1px solid var(--gray-100);
  }
  .mobile-menu a:hover { color: var(--primary); background: rgba(37,99,235,0.06); }
  .mobile-menu .nav-cta {
    background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
    color: white !important; text-align: center; border-radius: 50px !important; border: none !important;
  }

  /* PAGE HERO */
  .page-hero {
    background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
    padding: 60px 24px; text-align: center; color: white; position: relative; overflow: hidden;
  }
  .page-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .page-hero-content { position: relative; max-width: 700px; margin: 0 auto; }
  .page-hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
    padding: 6px 16px; border-radius: 50px; font-size: 13px; font-weight: 500; margin-bottom: 20px;
  }
  .page-hero h1 { font-size: clamp(28px, 5vw, 48px); font-weight: 800; margin-bottom: 16px; line-height: 1.2; }
  .page-hero p { font-size: 18px; opacity: 0.9; max-width: 500px; margin: 0 auto; }

  /* BREADCRUMB */
  .breadcrumb-bar { background: white; border-bottom: 1px solid var(--gray-200); padding: 12px 24px; }
  .breadcrumb-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .breadcrumb-inner a { color: var(--primary); text-decoration: none; }
  .breadcrumb-inner a:hover { text-decoration: underline; }
  .breadcrumb-inner span { color: var(--gray-400); }
  .breadcrumb-inner .current { color: var(--gray-600); }

  /* MAIN LAYOUT */
  .main-container { max-width: 1280px; margin: 0 auto; padding: 48px 24px; display: grid; grid-template-columns: 1fr 340px; gap: 40px; }

  /* FILTER BAR */
  .filter-bar { margin-bottom: 32px; }
  .filter-bar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .filter-bar-top h2 { font-size: 22px; font-weight: 700; color: var(--gray-900); }
  .results-count { font-size: 14px; color: var(--gray-500); }
  .category-filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .cat-btn {
    padding: 8px 18px; border-radius: 50px; border: 2px solid var(--gray-200);
    background: white; color: var(--gray-600); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: var(--transition); font-family: inherit;
  }
  .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
  .cat-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .search-bar { position: relative; margin-bottom: 16px; }
  .search-bar input {
    width: 100%; padding: 12px 16px 12px 44px; border: 2px solid var(--gray-200);
    border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
    background: white; color: var(--gray-800); transition: var(--transition); outline: none;
  }
  .search-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .search-bar svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400); }

  /* POSTS GRID */
  .posts-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .post-card {
    background: white; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: var(--transition); border: 1px solid var(--gray-100);
    display: flex; flex-direction: column;
  }
  .post-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
  .post-card-img {
    width: 100%; height: 200px; object-fit: cover; background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center; color: white; font-size: 40px;
    flex-shrink: 0;
  }
  .post-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .post-card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
  .post-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .post-category {
    background: rgba(37,99,235,0.1); color: var(--primary);
    font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .post-date { font-size: 12px; color: var(--gray-400); display: flex; align-items: center; gap: 4px; }
  .post-card h3 { font-size: 17px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; line-height: 1.4; }
  .post-card p { font-size: 14px; color: var(--gray-500); line-height: 1.6; flex: 1; margin-bottom: 16px; }
  .post-card-footer { display: flex; align-items: center; justify-content: space-between; }
  .post-author { display: flex; align-items: center; gap: 8px; }
  .author-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center; color: white; font-size: 11px; font-weight: 700;
  }
  .author-name { font-size: 12px; color: var(--gray-500); font-weight: 500; }
  .read-more {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--primary); font-size: 13px; font-weight: 600; text-decoration: none; transition: var(--transition);
  }
  .read-more:hover { gap: 10px; }
  .post-read-time { font-size: 12px; color: var(--gray-400); }

  /* FEATURED POST */
  .featured-post {
    background: white; border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow-md); border: 1px solid var(--gray-100);
    display: grid; grid-template-columns: 1fr 1fr; margin-bottom: 32px;
    transition: var(--transition);
  }
  .featured-post:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .featured-img {
    height: 280px; background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center; font-size: 60px; color: white; position: relative;
  }
  .featured-img img { width: 100%; height: 100%; object-fit: cover; }
  .featured-badge {
    position: absolute; top: 16px; left: 16px;
    background: #f59e0b; color: white; font-size: 11px; font-weight: 700;
    padding: 4px 12px; border-radius: 50px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .featured-body { padding: 32px; display: flex; flex-direction: column; justify-content: center; }
  .featured-body .post-category { margin-bottom: 12px; display: inline-block; }
  .featured-body h2 { font-size: 22px; font-weight: 800; color: var(--gray-900); margin-bottom: 12px; line-height: 1.3; }
  .featured-body p { font-size: 15px; color: var(--gray-500); margin-bottom: 20px; line-height: 1.7; }
  .featured-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white; padding: 12px 24px; border-radius: 50px; text-decoration: none;
    font-size: 14px; font-weight: 600; transition: var(--transition); width: fit-content;
  }
  .featured-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }

  /* LOADING / EMPTY */
  .loading-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
  .skeleton { background: var(--gray-200); border-radius: var(--radius); overflow: hidden; }
  .skeleton-img { height: 200px; background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
  .skeleton-body { padding: 20px; }
  .skeleton-line { height: 12px; background: linear-gradient(90deg, var(--gray-200) 25%, var(--gray-100) 50%, var(--gray-200) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; margin-bottom: 10px; }
  .skeleton-line.short { width: 60%; }
  .skeleton-line.medium { width: 80%; }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .empty-state { text-align: center; padding: 60px 20px; grid-column: 1/-1; }
  .empty-state svg { margin-bottom: 16px; color: var(--gray-300); }
  .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--gray-700); margin-bottom: 8px; }
  .empty-state p { color: var(--gray-400); font-size: 15px; }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 40px; }
  .page-btn {
    width: 40px; height: 40px; border-radius: var(--radius-sm); border: 2px solid var(--gray-200);
    background: white; color: var(--gray-600); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center;
    font-family: inherit;
  }
  .page-btn:hover { border-color: var(--primary); color: var(--primary); }
  .page-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .page-btn.arrow { width: auto; padding: 0 14px; gap: 6px; font-size: 13px; }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 28px; }
  .sidebar-widget { background: white; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); border: 1px solid var(--gray-100); }
  .widget-title { font-size: 16px; font-weight: 700; color: var(--gray-900); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--gray-100); display: flex; align-items: center; gap: 8px; }
  .widget-title span { color: var(--primary); }

  /* RECENT POSTS */
  .recent-post { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--gray-100); cursor: pointer; transition: var(--transition); }
  .recent-post:last-child { border-bottom: none; padding-bottom: 0; }
  .recent-post:hover { transform: translateX(4px); }
  .recent-thumb {
    width: 60px; height: 60px; border-radius: var(--radius-sm); flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;
    overflow: hidden;
  }
  .recent-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .recent-info { flex: 1; min-width: 0; }
  .recent-info h4 { font-size: 13px; font-weight: 600; color: var(--gray-800); line-height: 1.4; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .recent-info span { font-size: 11px; color: var(--gray-400); }

  /* CATEGORIES WIDGET */
  .cat-list { display: flex; flex-direction: column; gap: 8px; }
  .cat-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-radius: var(--radius-sm); background: var(--gray-50);
    cursor: pointer; transition: var(--transition); text-decoration: none;
  }
  .cat-item:hover { background: rgba(37,99,235,0.08); }
  .cat-item-left { display: flex; align-items: center; gap: 10px; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
  .cat-item-name { font-size: 14px; font-weight: 500; color: var(--gray-700); }
  .cat-count { background: var(--gray-200); color: var(--gray-600); font-size: 12px; font-weight: 600; padding: 2px 8px; border-radius: 50px; }

  /* NEWSLETTER WIDGET */
  .newsletter-widget { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
  .newsletter-widget .widget-title { color: white; border-color: rgba(255,255,255,0.2); }
  .newsletter-widget p { font-size: 14px; opacity: 0.9; margin-bottom: 16px; line-height: 1.6; }
  .newsletter-form { display: flex; flex-direction: column; gap: 10px; }
  .newsletter-form input {
    padding: 12px 16px; border-radius: var(--radius-sm); border: none; outline: none;
    font-size: 14px; font-family: inherit; background: rgba(255,255,255,0.2);
    color: white; placeholder-color: rgba(255,255,255,0.7);
  }
  .newsletter-form input::placeholder { color: rgba(255,255,255,0.7); }
  .newsletter-form input:focus { background: rgba(255,255,255,0.3); }
  .newsletter-btn {
    padding: 12px; border-radius: var(--radius-sm); border: none;
    background: white; color: var(--primary); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: var(--transition); font-family: inherit;
  }
  .newsletter-btn:hover { background: var(--gray-100); transform: translateY(-1px); }

  /* TAGS WIDGET */
  .tags-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    padding: 6px 14px; border-radius: 50px; background: var(--gray-100);
    color: var(--gray-600); font-size: 12px; font-weight: 500; cursor: pointer; transition: var(--transition);
    border: 1px solid var(--gray-200);
  }
  .tag:hover { background: var(--primary); color: white; border-color: var(--primary); }

  /* WHATSAPP FLOAT */
  .whatsapp-float {
    position: fixed; bottom: 28px; right: 28px; z-index: 998;
    width: 60px; height: 60px; border-radius: 50%;
    background: #25d366; color: white; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 24px rgba(37,211,102,0.4); text-decoration: none;
    transition: var(--transition); animation: pulse-wa 2s infinite;
  }
  .whatsapp-float:hover { transform: scale(1.1); box-shadow: 0 12px 32px rgba(37,211,102,0.5); }
  @keyframes pulse-wa {
    0%, 100% { box-shadow: 0 8px 24px rgba(37,211,102,0.4); }
    50% { box-shadow: 0 8px 32px rgba(37,211,102,0.6), 0 0 0 8px rgba(37,211,102,0.1); }
  }
  .whatsapp-float svg { width: 30px; height: 30px; }

  /* LGPD BANNER */
  .lgpd-banner {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 997;
    background: var(--gray-900); color: white; padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    transform: translateY(100%); transition: transform 0.4s ease;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
  }
  .lgpd-banner.show { transform: translateY(0); }
  .lgpd-text { font-size: 13px; color: var(--gray-300); flex: 1; line-height: 1.5; }
  .lgpd-text a { color: var(--secondary); text-decoration: none; }
  .lgpd-text a:hover { text-decoration: underline; }
  .lgpd-actions { display: flex; gap: 10px; flex-shrink: 0; }
  .lgpd-btn {
    padding: 8px 20px; border-radius: var(--radius-sm); border: none;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: var(--transition); font-family: inherit;
  }
  .lgpd-accept { background: var(--primary); color: white; }
  .lgpd-accept:hover { background: var(--primary-dark); }
  .lgpd-reject { background: transparent; color: var(--gray-400); border: 1px solid var(--gray-600) !important; }
  .lgpd-reject:hover { color: white; border-color: var(--gray-400) !important; }

  /* FOOTER */
  footer { background: var(--gray-900); color: var(--gray-300); margin-top: 80px; }
  .footer-main { max-width: 1280px; margin: 0 auto; padding: 60px 24px 40px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 40px; }
  .footer-brand .logo { margin-bottom: 16px; }
  .footer-brand .logo-name { color: white; }
  .footer-brand p { font-size: 14px; line-height: 1.7; color: var(--gray-400); margin-bottom: 20px; }
  .social-links { display: flex; gap: 10px; }
  .social-link {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    background: var(--gray-800); display: flex; align-items: center; justify-content: center;
    color: var(--gray-400); text-decoration: none; transition: var(--transition); font-size: 16px;
  }
  .social-link:hover { background: var(--primary); color: white; transform: translateY(-2px); }
  .footer-col h4 { font-size: 14px; font-weight: 700; color: white; margin-bottom: 16px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .footer-col ul li a { color: var(--gray-400); text-decoration: none; font-size: 14px; transition: var(--transition); }
  .footer-col ul li a:hover { color: var(--secondary); padding-left: 4px; }
  .footer-bottom { border-top: 1px solid var(--gray-800); padding: 20px 24px; }
  .footer-bottom-inner { max-width: 1280px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .footer-bottom p { font-size: 13px; color: var(--gray-500); }
  .footer-bottom-links { display: flex; gap: 20px; }
  .footer-bottom-links a { font-size: 13px; color: var(--gray-500); text-decoration: none; transition: var(--transition); }
  .footer-bottom-links a:hover { color: var(--secondary); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000;
    display: flex; align-items: center; justify-content: center; padding: 24px;
    opacity: 0; visibility: hidden; transition: var(--transition);
  }
  .modal-overlay.open { opacity: 1; visibility: visible; }
  .modal {
    background: white; border-radius: var(--radius-lg); max-width: 700px; width: 100%;
    max-height: 80vh; overflow-y: auto; transform: scale(0.9); transition: var(--transition);
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-header { padding: 28px 28px 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
  .modal-header h2 { font-size: 22px; font-weight: 800; color: var(--gray-900); line-height: 1.3; }
  .modal-close { width: 36px; height: 36px; border-radius: 50%; border: none; background: var(--gray-100); cursor: pointer; display: flex;
